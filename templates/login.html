<!DOCTYPE html>
<html>
<head>
    <title>StarCare Admin</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(
                135deg,
                #59e3ec,
                #dffbfc
            );
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:380px;
            background:white;
            padding:40px;
            border-radius:35px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.15);
        }

        .logo{
            width:95px;
            height:95px;
            margin:auto;
            border-radius:50%;
            background:#59e3ec;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:42px;
            box-shadow:0 5px 18px rgba(89,227,236,.45);
        }

        h1{
            margin:20px 0 8px;
            color:#1b2a41;
        }

        .subtitle{
            color:#777;
            margin-bottom:25px;
            font-size:15px;
        }

        input{
            width:100%;
            padding:15px;
            margin:12px 0;
            border:1px solid #ddd;
            border-radius:18px;
            box-sizing:border-box;
            font-size:15px;
            outline:none;
            transition:.3s;
        }

        input:focus{
            border-color:#59e3ec;
            box-shadow:0 0 8px rgba(89,227,236,.35);
        }

        .login-btn{
            width:100%;
            padding:15px;
            margin-top:18px;
            border:none;
            border-radius:18px;
            background:#59e3ec;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            background:#43d2dc;
            transform:translateY(-2px);
        }

        .footer{
            margin-top:20px;
            color:#999;
            font-size:13px;
        }

    </style>
</head>

<body>

<div class="card">

    <div class="logo">
        ❤
    </div>

    <h1>StarCare Admin</h1>

    <div class="subtitle">
        Secure Dashboard Access
    </div>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button
            class="login-btn"
            type="submit">

            Login
        </button>

    </form>

    <div class="footer">
        StarCare Hospital System
    </div>

</div>

</body>
</html>
