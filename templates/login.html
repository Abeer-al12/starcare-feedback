<!DOCTYPE html>
<html>
<head>
    <title>StarCare</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(
                135deg,
                #00A79B,
                #dffbfc
            );
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:380px;
            background:white;
            padding:40px;
            border-radius:35px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.15);
        }

        .logo{
    width: 200px;
    height:auto;
    display:block;
    margin:0 auto 20px;
        }

        h1{
            margin:20px 0 8px;
            color:#1b2a41;
        }

        .subtitle{
            color:#777;
            margin-bottom:25px;
            font-size:15px;
        }

        input{
            width:100%;
            padding:15px;
            margin:12px 0;
            border:1px solid #ddd;
            border-radius:18px;
            box-sizing:border-box;
            font-size:15px;
            outline:none;
            transition:.3s;
        }

        input:focus{
            border-color:#00A79B;
            box-shadow:0 0 8px rgba(89,227,236,.35);
        }

        .login-btn{
            width:100%;
            padding:15px;
            margin-top:18px;
            border:none;
            border-radius:18px;
            background:#00A79B;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            background:#00A79B;
            transform:translateY(-2px);
        }

        .footer{
            margin-top:20px;
            color:#999;
            font-size:13px;
        }

        .lang-switch{
            display:flex;
            justify-content:flex-end;
            gap:8px;
            margin-bottom:15px;
        }

        .lang-switch button{
            background:white;
            color:#00A79B;
            border:2px solid #00A79B;
            padding:8px 16px;
            border-radius:20px;
            cursor:pointer;
            font-weight:bold;
            transition:.3s;
        }

        .lang-switch button:hover{
            background:#00A79B;
            color:white;
            transform:translateY(-2px);
        }

    </style>
</head>

<body>
<div class="lang-switch">
    <button onclick="setLang('en')" type="button">English</button>
    <button onclick="setLang('ar')" type="button">عربي</button>
</div>
<div class="card">
    

    <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">


<div class="subtitle"
     data-en="Secure Dashboard Access"
     data-ar="تسجيل الدخول إلى لوحة التحكم">
    Secure Dashboard Access
</div>

    <form method="POST">

        <input
        id="username"
        type="text"
        name="username"
        placeholder="Username"
        required>

        <input
        id="password"
        type="password"
        name="password"
        placeholder="Password"
        required>

        <button
        id="loginBtn"
        class="login-btn"
        type="submit">
        Login
        </button>

    </form>

    <div class="footer"
     data-en="StarCare Hospital System"
     data-ar="نظام مستشفى ستاركير">
    StarCare Hospital System
    </div>

</div>
<script>
function setLang(lang){

    localStorage.setItem("lang", lang);

    document.body.dir = (lang === "ar") ? "rtl" : "ltr";

    document.querySelector(".subtitle").innerText =
        (lang === "ar")
        ? "تسجيل الدخول إلى لوحة التحكم"
        : "Secure Dashboard Access";

    document.getElementById("username").placeholder =
        (lang === "ar")
        ? "اسم المستخدم"
        : "Username";

    document.getElementById("password").placeholder =
        (lang === "ar")
        ? "كلمة المرور"
        : "Password";

    document.getElementById("loginBtn").innerText =
        (lang === "ar")
        ? "تسجيل الدخول"
        : "Login";

    document.querySelector(".footer").innerText =
        (lang === "ar")
        ? "نظام مستشفى ستاركير"
        : "StarCare Hospital System";
}

window.onload = function(){
    let lang = localStorage.getItem("lang") || "en";
    setLang(lang);
}
</script>
</body>
</html>
