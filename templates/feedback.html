<!DOCTYPE html>
<html>

<head>
    <title>StarCare Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f6fbfc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 430px;
            padding: 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .10);
        }

        .logo {
            width: 200px;
            height: auto;
            display: block;
            margin: 0 auto 20px;
        }

        h1 {
            color: #1b2a41;
            margin: 15px 0 5px;
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .lang-switch button {
            background: #eafcfd;
            color: #00A79B;
            border: 1px solid #00A79B;
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin: 0;
        }

        .lang-switch button:hover {
            background: #00A79B;
            color: white;
        }

        .title {
            color: #666;
            margin-top: 10px;
            font-size: 16px;
        }

        .room {
            color: #00A79B;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }

        .stars {
            display: flex;
            justify-content: center;
            flex-direction: row-reverse;
            margin: 25px 0;
        }

        .stars input {
            display: none;
        }

        .stars label {
            font-size: 48px;
            color: #d7d7d7;
            cursor: pointer;
            padding: 4px;
            transition: .2s;
        }

        .stars input:checked~label,
        .stars label:hover,
        .stars label:hover~label {
            color: #00A79B;
        }

        #starText {
            color: #777;
            margin-bottom: 18px;
        }

        textarea {
            width: 100%;
            height: 110px;
            border: 1px solid #ddd;
            border-radius: 18px;
            padding: 15px;
            font-size: 15px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: #00A79B;
        }

        .submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 18px;
            background: #00A79B;
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: .3s;
            font-weight: bold;
        }

        .submit-btn:hover {
            background: #00A79B;
        }
    </style>
</head>

<body>

    <div class="card">

        <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">



        <div class="lang-switch">
            <button type="button" onclick="setLang('en')">
                English
            </button>

            <button type="button" onclick="setLang('ar')">
                عربي
            </button>
        </div>

        <p class="title" id="titleText">
            Rate our Service
        </p>

        <div class="room">
            {{ room_name }}
        </div>

        <form id="feedbackForm">

            <select id="categorySelect" style="width:100%;padding:12px;margin-bottom:15px;border-radius:10px;">
                <option value="general">General Experience</option>
            </select>

            <div class="stars">

                <input type="radio" name="rating" value="5" id="5" required>
                <label for="5">★</label>

                <input type="radio" name="rating" value="4" id="4">
                <label for="4">★</label>

                <input type="radio" name="rating" value="3" id="3">
                <label for="3">★</label>

                <input type="radio" name="rating" value="2" id="2">
                <label for="2">★</label>

                <input type="radio" name="rating" value="1" id="1">
                <label for="1">★</label>

            </div>

            <!-- <input type="text" name="phone" placeholder="Optional phone number"> -->
            <p id="starText">
                Tap a star to rate
            </p>

            <textarea name="comment" id="commentBox" placeholder="Share your thoughts...">
        </textarea>

            <button class="submit-btn" type="submit">
                <span id="btnText">
                    Submit Feedback
                </span>
            </button>

        </form>

    </div>

    <script>

        const i18n = {
            en: {
                skip: "Skip",
                nameRequired: "Name is required",
                phoneRequired: "Phone number must be 8 digits",
                contactTitle: "Contact Information",
                contactText: "We are sorry your experience was not satisfactory. Please enter your phone number so we can contact you.",
                submit: "Submit"
            },
            ar: {
                skip: "تخطي",
                nameRequired: "الاسم مطلوب",
                phoneRequired: "يجب أن يتكون رقم الهاتف من 8 أرقام",
                contactTitle: "معلومات التواصل",
                contactText: "نعتذر أن تجربتك لم تكن بالمستوى المطلوب، يرجى إدخال رقم الهاتف للتواصل معك.",
                submit: "إرسال"
            }
        };

        let currentLang = "en";
        function setLang(lang) {

            currentLang = lang;

            document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";

            document.getElementById("titleText").innerHTML =
                lang === "ar" ? "قيّم خدمتنا" : "Rate our Service";

            document.getElementById("starText").innerHTML =
                lang === "ar" ? "اضغط على النجوم للتقييم" : "Tap a star to rate";

            document.getElementById("commentBox").placeholder =
                lang === "ar" ? "اكتب ملاحظاتك..." : "Share your thoughts...";

            document.getElementById("btnText").innerHTML =
                lang === "ar" ? "إرسال التقييم" : "Submit Feedback";

            // ⭐ هنا تحطه
            const skipBtn = document.getElementById("skipBtn");
            if (skipBtn) skipBtn.innerText = i18n[lang].skip;

            // popup
            if (popupTitle) {
                popupTitle.innerHTML = i18n[lang].contactTitle;
                popupText.innerHTML = i18n[lang].contactText;
                popupBtn.innerHTML = i18n[lang].submit;
            }
        }

    </script>
    <div id="phonePopup" style="display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.45);
            justify-content:center;
            align-items:center;
            z-index:999;">

        <div style="
        background:white;
        width:350px;
        padding:30px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);">

            <h2 id="popupTitle" style="color:#00A79B;margin-top:0;">
                Contact Information
            </h2>

            <p id="popupText" style="color:#666;font-size:14px;margin-bottom:20px;">
                We are sorry your experience was not satisfactory.
                Please enter your phone number so we can contact you.
            </p>

            <input type="text" id="popupName" placeholder="Full Name" style="
                width:100%;
                padding:14px;
                border:1px solid #ddd;
                border-radius:15px;
                font-size:15px;
                box-sizing:border-box;
                outline:none;
                margin-bottom:10px;">

            <input type="text" id="popupPhone" placeholder="Phone Number" style="
                width:100%;
                padding:14px;
                border:1px solid #ddd;
                border-radius:15px;
                font-size:15px;
                box-sizing:border-box;
                outline:none;">

            <button id="popupBtn" onclick="submitLowRating()" style="
                width:100%;
                margin-top:15px;
                padding:14px;
                border:none;
                border-radius:15px;
                background:#00A79B;
                color:white;
                font-size:16px;
                font-weight:bold;
                cursor:pointer;">
                Submit
            </button>

            <button id="skipBtn" onclick="skipContact()" style="
                width:100%;
                margin-top:10px;
                padding:14px;
                border:none;
                border-radius:15px;
                background:#ddd;
                cursor:pointer;">
                Skip
            </button>
        </div>
    </div>
    <script>

        let tempRating = 0;
        let tempComment = "";
        let isLowRating = false;

        document.getElementById("feedbackForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let ratingEl = document.querySelector('input[name="rating"]:checked');
            if (!ratingEl) return alert("اختر تقييم");

            let rating = parseInt(ratingEl.value);
            let comment = document.getElementById("commentBox").value;

            // نخزن البيانات مؤقت
            tempRating = rating;
            tempComment = comment;

            // ⭐ 1–3 (إجباري)
            if (rating <= 3) {
                isLowRating = true;
            }

            // ⭐ 4–5 (اختياري)
            else {
                isLowRating = false;
            }

            // 👇 فتح popup بعد التحديد
            document.getElementById("phonePopup").style.display = "flex";
        });
        // ---------------- SUBMIT LOW RATING ----------------
        function submitLowRating() {

            let name = document.getElementById("popupName").value.trim();
            let phone = document.getElementById("popupPhone").value.trim();

            // ⭐ 1-3 إجباري
            if (isLowRating) {

                if (!name || name.length < 2) {
                    alert("Name required");
                    return;
                }

                if (phone.length !== 8 || isNaN(phone)) {
                    alert("Phone must be 8 digits");
                    return;
                }
            }

            fetch("/save_low_rating", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    location: "{{ room }}",
                    rating: tempRating,
                    comment: tempComment,
                    name: name || null,
                    phone: phone || null
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                    }
                });
        }


        document.addEventListener("DOMContentLoaded", function () {

            let branch = "{{ branch }}";
            let select = document.getElementById("categorySelect");

            if (!select) {
                console.log("categorySelect not found");
                return;
            }

            console.log("Branch is:", branch);

            let options = `<option value="general">General Experience</option>`;

            if (branch === "it") {
                options = `
            <option value="general">IT Overall</option>
            <option value="support">IT Support</option>
            <option value="systems">Systems Performance</option>
            <option value="communication">Communication</option>
        `;
            }

            else if (branch === "nurse") {
                options = `
            <option value="general">Nursing Service</option>
            <option value="care">Patient Care</option>
            <option value="response">Response Time</option>
        `;
            }

            else if (branch === "doctor") {
                options = `
            <option value="general">Doctor Service</option>
            <option value="consultation">Consultation</option>
        `;
            }

            select.innerHTML = options;
        });
        // ---------------- SKIP BUTTON ----------------
        function skipContact() {

            // ❌ ممنوع skip إذا 1–3
            if (isLowRating) {
                alert("الاسم والرقم إجباري");
                return;
            }

            fetch("/save_low_rating", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    location: "{{ room }}",
                    rating: tempRating,
                    comment: tempComment,
                    name: null,
                    phone: null
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                    }
                });
        }
    </script>

</body>

</html>
