<!DOCTYPE html>
<html>

<head>
    <title>StarCare Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f6fbfc;
        }

        /* ================= CARD ================= */
        .card {
            background: white;
            width: 430px;
            margin: 40px auto;
            padding: 35px;
            border-radius: 30px;
        }

        /* ================= LOGO ================= */
        .logo {
            width: 200px;
            display: block;
            margin: 0 auto 20px;
        }

        /* ================= ROOM ================= */
        .room {
            color: #00A79B;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
        }

        /* ================= LANG BUTTONS ================= */
        .lang-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-switch button {
            background: #eafcfd;
            color: #00A79B;
            border: 1px solid #00A79B;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-switch button:hover {
            background: #00A79B;
            color: white;
        }

        .lang-switch button.active {
            background: #00A79B;
            color: white;
        }

        /* ================= QUESTIONS ================= */
        .question-block {
            margin-bottom: 25px;
        }

        /* title */
        .question-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
        }

        /* ================= STARS FIX (IMPORTANT) ================= */
        .rating-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        /* السؤال */
        .question-text {
            flex: 1;
            font-size: 16px;
            font-weight: bold;
        }

        /* النجوم */
        .stars {
            display: flex;
            flex-direction: row-reverse;
            gap: 4px;
            flex-shrink: 0;
        }

        .stars label {
            font-size: 34px;
            color: #d8d8d8;
            cursor: pointer;
        }

        /* اختيار + hover */
        .stars input:checked~label,
        .stars label:hover,
        .stars label:hover~label {
            color: #00A79B;
        }

        .stars input {
            display: none;
        }

        /* ================= TEXTAREA ================= */
        textarea {
            width: 100%;
            height: 110px;
            border: 1px solid #ddd;
            border-radius: 18px;
            padding: 15px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #00A79B;
        }

        /* ================= SUBMIT ================= */
        .submit-btn {
            width: 100%;
            background: #00A79B;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: #008f88;
        }

        /* ================= RTL / LTR FIX ================= */
        /* 🔥 عربي */
        /* html[dir="rtl"] .rating-group {
            flex-direction: row-reverse;
            text-align: right;
        } */

        /* 🔥 إنجليزي */
        /* html[dir="ltr"] .rating-group {
            flex-direction: row;
            text-align: left;
        } */

        /* يخلي المحتوى يمشي صح */
        /* html[dir="rtl"] .rating-group {
            flex-direction: row-reverse;
        } */

        /* ================= MOBILE ================= */
        @media (max-width: 600px) {
            .card {
                width: 92%;
                padding: 18px;
            }

            .stars label {
                font-size: 30px;
            }
        }


        /* English */
        /* html[dir="ltr"] .rating-group {
            flex-direction: row;
        }

        html[dir="ltr"] .question-title {
            text-align: left;
        }

        html[dir="ltr"] .stars {
            justify-content: flex-end;
        } */


        /* Arabic */
        /* html[dir="rtl"] .rating-group {
            flex-direction: row-reverse;
        }

        html[dir="rtl"] .question-title {
            text-align: right;
        }

        html[dir="rtl"] .stars {
            justify-content: flex-start;
        } */

        /* ================= ENGLISH ================= */

        html[dir="ltr"] .rating-group {
            display: flex;
            align-items: center;
        }

        html[dir="ltr"] .question-title {
            order: 1;
            flex: 1;
            text-align: left;
        }

        html[dir="ltr"] .stars {
            order: 2;
        }

        /* ================= ARABIC ================= */

        html[dir="rtl"] .rating-group {
            display: flex;
            align-items: center;
        }

        html[dir="rtl"] .question-title {
            order: 2;
            flex: 1;
            text-align: right;
        }

        html[dir="rtl"] .stars {
            order: 1;
        }

        .stars label {
            position: relative;
            font-size: 34px;
            cursor: pointer;
        }

        /* tooltip */
        .stars label::after {
            content: attr(data-label);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #1b2a41;
            color: white;
            font-size: 12px;
            padding: 5px 8px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .stars label:hover::after {
            opacity: 1;
        }
    </style>
</head>
<div id="errorMsg" style="
    display:none;
    background:#ffdddd;
    color:#b30000;
    padding:10px;
    margin-bottom:15px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
"></div>

<body>

    <div class="card">

        <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">



        <div class="lang-switch">

            <button id="btnEN" type="button" onclick="setLang('en')">
                English
            </button>

            <button id="btnAR" type="button" onclick="setLang('ar')">
                عربي
            </button>

        </div>

        <!-- <p class="title" id="titleText">
            Rate our Service
        </p> -->

        <div class="room">
            {{ room_name }}
        </div>

        <form id="feedbackForm">

            <div class="question-block">

                <!-- <div class="question-title">
                    What would you like to rate?
                </div> -->

                <!-- 👇 هنا حطيه -->
                <div class="rating-guide">
                    <span id="poorText"></span>
                    <span id="excellentText"></span>
                </div>

                <div class="rating-guide">

                    <!-- <span>★☆☆☆☆ Poor</span>
                    <span>★★☆☆☆ Fair</span>
                    <span>★★★☆☆ Good</span>
                    <span>★★★★☆ Very Good</span>
                    <span>★★★★★ Excellent</span> -->

                </div>

                <p style="text-align:center; font-size:13px; color:#00A79B; margin-bottom:10px;"
                    data-en="★ 1 = Bad | ★ 5 = Excellent" data-ar="★ 1 = سيئ | ★ 5 = ممتاز">
                    ★ 1 = Bad • ★ 5 = Excellent
                </p>
                <div id="questionsContainer">

                    {% for q in questions["en"] %}

                    <div class="rating-group">

                        <h4 class="question-title" data-en="{{ questions['en'][loop.index0] }}"
                            data-ar="{{ questions['ar'][loop.index0] }}">
                            {{ questions['en'][loop.index0] }}
                        </h4>

                        <div class="stars">
                            <input type="radio" name="q{{ loop.index }}" value="5" id="q{{ loop.index }}_5">
                            <label for="q{{ loop.index }}_5" data-en-label="Excellent" data-ar-label="ممتاز">★</label>

                            <input type="radio" name="q{{ loop.index }}" value="4" id="q{{ loop.index }}_4">
                            <label for="q{{ loop.index }}_4" data-en-label="Good" data-ar-label="جيد">★</label>

                            <input type="radio" name="q{{ loop.index }}" value="3" id="q{{ loop.index }}_3">
                            <label for="q{{ loop.index }}_3" data-en-label="Average" data-ar-label="متوسط">★</label>

                            <input type="radio" name="q{{ loop.index }}" value="2" id="q{{ loop.index }}_2">
                            <label for="q{{ loop.index }}_2" data-en-label="Bad" data-ar-label="سيئ">★</label>

                            <input type="radio" name="q{{ loop.index }}" value="1" id="q{{ loop.index }}_1">
                            <label for="q{{ loop.index }}_1" data-en-label="Very Bad" data-ar-label="سيئ جدًا">★</label>
                        </div>

                    </div>

                    {% endfor %}

                </div>

                <div class="question-block">

                    <div class="question-title" data-key="qComment">
                        Your Comment
                    </div>

                    <textarea name="comment" id="commentBox" data-placeholder="qComment"></textarea>

                </div>

                <button class="submit-btn" type="submit" data-key="submitFeedback">
                    Submit Feedback
                </button>
        </form>

    </div>
    <script>
        const QUESTIONS = {{ questions | tojson }};
    </script>
    <script>

        const i18n = {
            qCategory: { en: "What would you like to rate?", ar: "ماذا تريد أن تقيم؟" },
            qSpeed: { en: "Service Speed", ar: "سرعة الخدمة" },
            qBehavior: { en: "Staff Behavior", ar: "سلوك الموظفين" },
            qRating: { en: "Rating", ar: "التقييم" },
            qComment: { en: "Your Comment", ar: "ملاحظاتك" },

            catFacility: { en: "Facility / Maintenance", ar: "المرافق / الصيانة" },
            catIT: { en: "IT", ar: "تقنية المعلومات" },
            catMedical: { en: "Medical Equipment", ar: "الأجهزة الطبية" },
            catNursing: { en: "Nursing", ar: "التمريض" },
            catOther: { en: "Other", ar: "أخرى" },

            speedFast: { en: "Fast", ar: "سريع" },
            speedAverage: { en: "Average", ar: "متوسط" },
            speedSlow: { en: "Slow", ar: "بطيء" },

            behExcellent: { en: "Excellent", ar: "ممتاز" },
            behGood: { en: "Good", ar: "جيد" },
            behBad: { en: "Bad", ar: "سيئ" },

            submitFeedback: {
                en: "Submit Feedback",
                ar: "إرسال التقييم"
            },

            popupTitle: {
                en: "Contact Information",
                ar: "معلومات التواصل"
            },

            popupText: {
                en: "We are sorry your experience was not satisfactory. Please enter your phone number so we can contact you.",
                ar: "نعتذر أن تجربتك لم تكن بالمستوى المطلوب، يرجى إدخال رقم الهاتف للتواصل معك."
            },

            fullName: {
                en: "Full Name",
                ar: "الاسم الكامل"
            },

            phoneNumber: {
                en: "Phone Number",
                ar: "رقم الهاتف"
            },

            submit: {
                en: "Submit",
                ar: "إرسال"
            },

            skip: {
                en: "Skip",
                ar: "تخطي"
            },

            messages: {
                en: {
                    required: "⚠️ Please answer all questions",
                    success: "Submitted successfully",
                    nameRequired: "Name is required",
                    phoneRequired: "Phone must be 8 digits"
                },
                ar: {
                    required: "⚠️ لازم تجاوب على كل الأسئلة",
                    success: "تم الإرسال بنجاح",
                    nameRequired: "الاسم مطلوب",
                    phoneRequired: "رقم الهاتف لازم يكون 8 أرقام"
                }
            },

            googleTitle: {
                en: "Loved our service? ⭐",
                ar: "هل أعجبتك خدمتنا؟ ⭐"
            },

            googleText: {
                en: "We'd really appreciate it if you could leave us a review on Google.",
                ar: "يسعدنا كثيرًا أن تشارك تجربتك معنا على خرائط Google."
            },

            googleBtn: {
                en: "⭐ Review us on Google",
                ar: "⭐ قيّمنا على خرائط Google"
            },
        };

        const translations = {

            en: {
                poor: "Poor",
                fair: "Fair",
                good: "Good",
                veryGood: "Very Good",
                excellent: "Excellent",
                submit: "Submit Feedback",
                english: "English",
                arabic: "Arabic"
            },

            ar: {
                poor: "سيئ",
                fair: "مقبول",
                good: "جيد",
                veryGood: "جيد جداً",
                excellent: "ممتاز",
                submit: "إرسال التقييم",
                english: "English",
                arabic: "عربي"
            }
        };

        let currentLang = "en";

        function changeLanguage(lang) {

            let url = new URL(window.location.href);

            url.searchParams.set("lang", lang);

            window.location.href = url.toString();

        }
        function setLang(lang) {

            currentLang = lang;

            // اتجاه الصفحة
            document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";
            document.documentElement.lang = lang;

            // تغيير النصوص
            document.querySelectorAll("[data-key]").forEach(el => {
                const key = el.getAttribute("data-key");
                if (i18n[key]) {
                    el.innerText = i18n[key][lang];
                }
            });

            // placeholders
            document.querySelectorAll("[data-placeholder]").forEach(el => {
                const key = el.getAttribute("data-placeholder");
                if (i18n[key]) {
                    el.placeholder = i18n[key][lang];
                }
            });

            // rating labels
            document.querySelectorAll(".rating-guide span").forEach(el => {
                const key = el.dataset.key;
                if (translations[key]) {
                    el.innerText = translations[key][lang];
                }
            });

            document.querySelectorAll(".stars label").forEach(label => {
                const text = label.dataset[lang + "Label"];
                if (text) {
                    label.setAttribute("data-label", text);
                }
            });

            // تغيير نصوص الأسئلة
            document.querySelectorAll(".question-title[data-en]").forEach(function (q) {
                q.innerText = q.dataset[lang];
            });

            document.querySelectorAll("[data-en]").forEach(el => {
                const text = el.getAttribute("data-" + lang);
                if (text) {
                    el.innerText = text;
                }
            });
            // زر اللغة active
            document.getElementById("btnEN").classList.remove("active");
            document.getElementById("btnAR").classList.remove("active");

            if (lang === "ar") {
                document.getElementById("btnAR").classList.add("active");
            } else {
                document.getElementById("btnEN").classList.add("active");
            }
        }


    </script>
    <div id="phonePopup" style="display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    justify-content:center;
    align-items:center;
    z-index:999;">

        <div style="
        background:white;
        width:90%;
        max-width:350px;
        padding:25px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
    ">

            <h2 id="popupTitle">
                Contact Information
            </h2>

            <p id="popupText">
                Please enter your details to continue
            </p>

            <input type="text" id="popupName" placeholder="Full Name"
                style="width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">

            <input type="text" id="popupPhone" placeholder="Phone Number"
                style="width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">

            <div id="googleReviewBox" style="margin:20px 0;text-align:center;display:none;">

                <p id="googleTitle" style="font-weight:bold;font-size:16px;"></p>

                <p id="googleText" style="color:#666;"></p>

                <a id="googleBtn" href="https://maps.app.goo.gl/MwWnzeJvRJ2xisDw7" target="_blank" style="
            display:inline-block;
            margin-top:10px;
            background:#4285F4;
            color:white;
            text-decoration:none;
            padding:12px 20px;
            border-radius:10px;
            font-weight:bold;">
                </a>

            </div>

            <button id="popupBtn" data-key="submit" onclick="submitLowRating()"
                style="width:100%;padding:12px;margin-top:10px;background:#00A79B;color:white;border:none;border-radius:10px;">
                Submit
            </button>

            <button id="skipBtn" data-key="skip" onclick="skipContact()"
                style="width:100%;padding:10px;margin-top:8px;background:#eee;border:none;border-radius:10px;">
                Skip
            </button>

        </div>
    </div>
    <script>

        let answers = [];
        let tempComment = "";
        let isLowRating = false;

        // ================= SHOW ERROR =================
        function showError(msg) {
            const box = document.getElementById("errorMsg");
            box.innerText = msg;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3000);
        }

        // ================= FORM SUBMIT =================
        document.getElementById("feedbackForm").addEventListener("submit", function (e) {
            e.preventDefault();

            answers = [];

            // 1️⃣ التأكد من كل الإجابات
            for (let i = 1; i <= 5; i++) {

                const selected = document.querySelector(`input[name="q${i}"]:checked`);

                if (!selected) {
                    alert(currentLang === "ar"
                        ? "يرجى الإجابة على جميع الأسئلة"
                        : "Please answer all questions");
                    return;
                }

                answers.push(parseInt(selected.value));
            }

            // 2️⃣ حفظ التعليق
            tempComment = document.getElementById("commentBox").value;
            // تحديد هل فيه تقييم منخفض
            isLowRating = answers.some(a => a <= 3);

            // فتح البوب أب
            document.getElementById("phonePopup").style.display = "flex";

            // تحديث اللغة
            setPopupLang(currentLang);

            // إظهار أو إخفاء Google Review
            if (isLowRating) {
                document.getElementById("googleReviewBox").style.display = "none";
            } else {
                document.getElementById("googleReviewBox").style.display = "block";
            }

            // 5️⃣ إظهار/إخفاء زر skip
            // document.getElementById("skipBtn").style.display =
            //     isLowRating ? "block" : "none";
        });


        // ================= POPUP SUBMIT =================
        function submitLowRating() {

            let name = document.getElementById("popupName").value.trim();
            let phone = document.getElementById("popupPhone").value.trim();

            // 🚨 تحقق مباشر بدون شروط ملخبطة
            if (!name) {
                alert(currentLang === "ar"
                    ? "الاسم مطلوب"
                    : "Name is required");
                return;
            }

            if (!phone) {
                alert(currentLang === "ar"
                    ? "رقم الهاتف مطلوب"
                    : "Phone is required");
                return;
            }

            if (!/^\d{8}$/.test(phone)) {
                alert(currentLang === "ar"
                    ? "رقم الهاتف يجب أن يكون 8 أرقام"
                    : "Phone must be 8 digits");
                return;
            }

            // ✔ فقط إذا كل شيء صحيح
            sendData(name, phone);
        }
        // ================= SKIP =================
        function skipContact() {

            sendData(null, null);

        }


        // ================= SEND DATA =================
        function sendData(name, phone) {

            fetch("/save_feedback", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({

                    branch: "{{ branch }}",

                    location: "{{ location }}",      // pharmacy أو xray أو lab...
                    room_number: "{{ room }}",       // pharmacy1 أو xray108...

                    answers: answers,
                    comment: tempComment,

                    name: name || null,
                    phone: phone || null
                })
            })
                .then(res => res.json())
                .then(data => {

                    if (!data.success) return;

                    let redirectUrl =
                        "{{ location }}" && "{{ room }}"
                            ? `/thankyou/{{ branch }}/{{ location }}/{{ room }}`
                            : `/thankyou/{{ branch }}/{{ room }}`;

                    // إذا التقييم ممتاز نرسل متغير للجوجل
                    if (!isLowRating) {
                        redirectUrl += "?google=1";
                    }

                    window.location.href = redirectUrl;

                });

        }


        // ================= POPUP LANGUAGE =================
        function setPopupLang(lang) {

            document.getElementById("popupTitle").innerText =
                i18n.popupTitle[lang];

            document.getElementById("popupText").innerText =
                i18n.popupText[lang];

            document.getElementById("popupName").placeholder =
                i18n.fullName[lang];

            document.getElementById("popupPhone").placeholder =
                i18n.phoneNumber[lang];

            document.getElementById("popupBtn").innerText =
                i18n.submit[lang];

            document.getElementById("skipBtn").innerText =
                i18n.skip[lang];

            document.getElementById("googleTitle").innerText =
                i18n.googleTitle[lang];

            document.getElementById("googleText").innerText =
                i18n.googleText[lang];

            document.getElementById("googleBtn").innerText =
                i18n.googleBtn[lang];
        }

    </script>
    <div id="toast"></div>
</body>

</html>
