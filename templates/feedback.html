<!DOCTYPE html>
<html>

<head>
    <title>StarCare Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f6fbfc;
        }

        /* ================= CARD ================= */
        .card {
            background: white;
            width: 430px;
            margin: 40px auto;
            padding: 35px;
            border-radius: 30px;
        }

        /* ================= LOGO ================= */
        .logo {
            width: 200px;
            display: block;
            margin: 0 auto 20px;
        }

        /* ================= ROOM ================= */
        .room {
            color: #00A79B;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
        }

        /* ================= LANG BUTTONS ================= */
        .lang-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-switch button {
            background: #eafcfd;
            color: #00A79B;
            border: 1px solid #00A79B;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-switch button:hover {
            background: #00A79B;
            color: white;
        }

        .lang-switch button.active {
            background: #00A79B;
            color: white;
        }

        /* ================= QUESTIONS ================= */
        .question-block {
            margin-bottom: 25px;
        }

        /* title */
        .question-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* ================= STARS FIX (IMPORTANT) ================= */
        .rating-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 22px;
        }

        /* السؤال */
        .question-text {
            flex: 1;
            font-size: 16px;
            font-weight: bold;
        }

        /* النجوم */
        .stars {
            display: flex;
            flex-direction: row-reverse;
            gap: 4px;
            direction: ltr;
            /* يمنع الانقلاب */
            flex-shrink: 0;
        }

        .stars label {
            font-size: 34px;
            color: #d8d8d8;
            cursor: pointer;
        }

        /* اختيار + hover */
        .stars input:checked~label,
        .stars label:hover,
        .stars label:hover~label {
            color: #00A79B;
        }

        /* ================= TEXTAREA ================= */
        textarea {
            width: 100%;
            height: 110px;
            border: 1px solid #ddd;
            border-radius: 18px;
            padding: 15px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #00A79B;
        }

        /* ================= SUBMIT ================= */
        .submit-btn {
            width: 100%;
            background: #00A79B;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: #008f88;
        }

        /* ================= RTL / LTR FIX ================= */
        /* 🔥 عربي */
        html[dir="rtl"] .rating-group {
            flex-direction: row-reverse;
            text-align: right;
        }

        /* 🔥 إنجليزي */
        html[dir="ltr"] .rating-group {
            flex-direction: row;
            text-align: left;
        }

        /* يخلي المحتوى يمشي صح */
        html[dir="rtl"] .rating-group {
            flex-direction: row-reverse;
        }

        /* ================= MOBILE ================= */
        @media (max-width: 600px) {
            .card {
                width: 92%;
                padding: 18px;
            }

            .stars label {
                font-size: 30px;
            }
        }
    </style>
</head>
<div id="errorMsg" style="
    display:none;
    background:#ffdddd;
    color:#b30000;
    padding:10px;
    margin-bottom:15px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
"></div>

<body>

    <div class="card">

        <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">



        <div class="lang-switch">

            <button id="btnEN" type="button" onclick="setLang('en')">
                English
            </button>

            <button id="btnAR" type="button" onclick="setLang('ar')">
                عربي
            </button>

        </div>

        <!-- <p class="title" id="titleText">
            Rate our Service
        </p> -->

        <div class="room">
            {{ room_name }}
        </div>

        <form id="feedbackForm">

            <div class="question-block">

                <!-- <div class="question-title">
                    What would you like to rate?
                </div> -->

                <!-- 👇 هنا حطيه -->
                <div class="rating-guide">
                    <span id="poorText"></span>
                    <span id="excellentText"></span>
                </div>

                <div class="rating-guide">

                    <!-- <span>★☆☆☆☆ Poor</span>
                    <span>★★☆☆☆ Fair</span>
                    <span>★★★☆☆ Good</span>
                    <span>★★★★☆ Very Good</span>
                    <span>★★★★★ Excellent</span> -->

                </div>

                <div id="questionsContainer">

                    {% for q in questions %}
                    <div class="rating-group">

                        <h4 class="question-title">
                            {{ q.title[lang] }}
                        </h4>

                        <div class="stars">
                            <input type="radio" name="{{ q.name }}" value="5" id="{{ q.name }}5">
                            <label for="{{ q.name }}5">★</label>

                            <input type="radio" name="{{ q.name }}" value="4" id="{{ q.name }}4">
                            <label for="{{ q.name }}4">★</label>

                            <input type="radio" name="{{ q.name }}" value="3" id="{{ q.name }}3">
                            <label for="{{ q.name }}3">★</label>

                            <input type="radio" name="{{ q.name }}" value="2" id="{{ q.name }}2">
                            <label for="{{ q.name }}2">★</label>

                            <input type="radio" name="{{ q.name }}" value="1" id="{{ q.name }}1">
                            <label for="{{ q.name }}1">★</label>
                        </div>

                    </div>
                    {% endfor %}
                    <div class="question-block">

                        <div class="question-title" data-key="qComment">
                            Your Comment
                        </div>

                        <textarea name="comment" id="commentBox" data-placeholder="qComment"></textarea>

                    </div>


                    <button class="submit-btn" type="submit" data-key="submitFeedback">
                        Submit Feedback
                    </button>

        </form>

    </div>

    <script>

        const i18n = {
            qCategory: { en: "What would you like to rate?", ar: "ماذا تريد أن تقيم؟" },
            qSpeed: { en: "Service Speed", ar: "سرعة الخدمة" },
            qBehavior: { en: "Staff Behavior", ar: "سلوك الموظفين" },
            qRating: { en: "Rating", ar: "التقييم" },
            qComment: { en: "Your Comment", ar: "ملاحظاتك" },

            catFacility: { en: "Facility / Maintenance", ar: "المرافق / الصيانة" },
            catIT: { en: "IT", ar: "تقنية المعلومات" },
            catMedical: { en: "Medical Equipment", ar: "الأجهزة الطبية" },
            catNursing: { en: "Nursing", ar: "التمريض" },
            catOther: { en: "Other", ar: "أخرى" },

            speedFast: { en: "Fast", ar: "سريع" },
            speedAverage: { en: "Average", ar: "متوسط" },
            speedSlow: { en: "Slow", ar: "بطيء" },

            behExcellent: { en: "Excellent", ar: "ممتاز" },
            behGood: { en: "Good", ar: "جيد" },
            behBad: { en: "Bad", ar: "سيئ" },

            submitFeedback: {
                en: "Submit Feedback",
                ar: "إرسال التقييم"
            },

            popupTitle: {
                en: "Contact Information",
                ar: "معلومات التواصل"
            },

            popupText: {
                en: "We are sorry your experience was not satisfactory. Please enter your phone number so we can contact you.",
                ar: "نعتذر أن تجربتك لم تكن بالمستوى المطلوب، يرجى إدخال رقم الهاتف للتواصل معك."
            },

            fullName: {
                en: "Full Name",
                ar: "الاسم الكامل"
            },

            phoneNumber: {
                en: "Phone Number",
                ar: "رقم الهاتف"
            },

            submit: {
                en: "Submit",
                ar: "إرسال"
            },

            skip: {
                en: "Skip",
                ar: "تخطي"
            },

            messages: {
                en: {
                    required: "⚠️ Please answer all questions",
                    success: "Submitted successfully",
                    nameRequired: "Name is required",
                    phoneRequired: "Phone must be 8 digits"
                },
                ar: {
                    required: "⚠️ لازم تجاوب على كل الأسئلة",
                    success: "تم الإرسال بنجاح",
                    nameRequired: "الاسم مطلوب",
                    phoneRequired: "رقم الهاتف لازم يكون 8 أرقام"
                }
            }
        };

        const translations = {

            en: {
                poor: "Poor",
                fair: "Fair",
                good: "Good",
                veryGood: "Very Good",
                excellent: "Excellent",
                submit: "Submit Feedback",
                english: "English",
                arabic: "Arabic"
            },

            ar: {
                poor: "سيئ",
                fair: "مقبول",
                good: "جيد",
                veryGood: "جيد جداً",
                excellent: "ممتاز",
                submit: "إرسال التقييم",
                english: "English",
                arabic: "عربي"
            }
        };

        let currentLang = "en";

        function changeLanguage(lang) {

            let url = new URL(window.location.href);

            url.searchParams.set("lang", lang);

            window.location.href = url.toString();

        }
        function setLang(lang) {

            currentLang = lang;

            // اتجاه الصفحة
            document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";
            document.documentElement.lang = lang;

            // تغيير النصوص
            document.querySelectorAll("[data-key]").forEach(el => {
                const key = el.getAttribute("data-key");
                if (i18n[key]) {
                    el.innerText = i18n[key][lang];
                }
            });

            // placeholders
            document.querySelectorAll("[data-placeholder]").forEach(el => {
                const key = el.getAttribute("data-placeholder");
                if (i18n[key]) {
                    el.placeholder = i18n[key][lang];
                }
            });

            // rating labels
            document.querySelectorAll(".rating-guide span").forEach(el => {
                const key = el.dataset.key;
                if (translations[key]) {
                    el.innerText = translations[key][lang];
                }
            });

            // زر اللغة active
            document.getElementById("btnEN").classList.remove("active");
            document.getElementById("btnAR").classList.remove("active");

            if (lang === "ar") {
                document.getElementById("btnAR").classList.add("active");
            } else {
                document.getElementById("btnEN").classList.add("active");
            }
        }


    </script>
    <div id="phonePopup" style="display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    justify-content:center;
    align-items:center;
    z-index:999;">

        <div style="
        background:white;
        width:90%;
        max-width:350px;
        padding:25px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
    ">

            <h2 id="popupTitle">
                Contact Information
            </h2>

            <p id="popupText">
                Please enter your details to continue
            </p>

            <input type="text" id="popupName" placeholder="Full Name"
                style="width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">

            <input type="text" id="popupPhone" placeholder="Phone Number"
                style="width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">

            <button id="popupBtn" data-key="submit" onclick="submitLowRating()"
                style="width:100%;padding:12px;margin-top:10px;background:#00A79B;color:white;border:none;border-radius:10px;">
                Submit
            </button>

            <button id="skipBtn" data-key="skip" onclick="skipContact()"
                style="width:100%;padding:10px;margin-top:8px;background:#eee;border:none;border-radius:10px;">
                Skip
            </button>

        </div>
    </div>
    <script>

        let tempRating = 0;
        let tempComment = "";
        let isLowRating = false;
        let facility = 0;
        let it = 0;
        let medical = 0;
        let nursing = 0;
        let other = 0;

        function showError(msg) {
            const box = document.getElementById("errorMsg");
            box.innerText = msg;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3000);
        }

        document.getElementById("feedbackForm").addEventListener("submit", function (e) {
            e.preventDefault();

            facility = document.querySelector('input[name="facility"]:checked')?.value;
            it = document.querySelector('input[name="it"]:checked')?.value;
            medical = document.querySelector('input[name="medical"]:checked')?.value;
            nursing = document.querySelector('input[name="nursing"]:checked')?.value;
            other = document.querySelector('input[name="other"]:checked')?.value;

            if (
                !facility ||
                !it ||
                !medical ||
                !nursing ||
                !other
            ) {
                alert(currentLang === "ar"
                    ? "يرجى الإجابة على جميع الأسئلة"
                    : "Please answer all questions");
                return;
            }

            // نحول القيم لأرقام
            facility = parseInt(facility);
            it = parseInt(it);
            medical = parseInt(medical);
            nursing = parseInt(nursing);
            other = parseInt(other);

            tempComment = document.getElementById("commentBox").value;

            // 🔥 نحسب إذا فيه تقييم منخفض
            isLowRating =
                facility <= 3 ||
                it <= 3 ||
                medical <= 3 ||
                nursing <= 3 ||
                other <= 3;

            if (isLowRating) {
                document.getElementById("skipBtn").style.display = "none";
            } else {
                document.getElementById("skipBtn").style.display = "block";
            }

            document.getElementById("phonePopup").style.display = "flex";
        });

        // ---------------- SUBMIT LOW RATING ----------------
        function submitLowRating() {

            let name = document.getElementById("popupName").value.trim();
            let phone = document.getElementById("popupPhone").value.trim();

            if (isLowRating) {

                if (!name) {
                    alert(currentLang === "ar"
                        ? "الاسم مطلوب"
                        : "Name is required");
                    return;
                }

                if (!/^\d{8}$/.test(phone)) {
                    alert(currentLang === "ar"
                        ? "رقم الهاتف يجب أن يكون 8 أرقام"
                        : "Phone must be 8 digits");
                    return;
                }
            }

            // ⭐ هذا السطر كان ناقص
            sendData(name, phone);
        }
        function sendData(name, phone) {

            fetch("/save_feedback", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    location: "{{ room }}",
                    branch: "{{ branch }}",

                    facility,
                    it,
                    medical,
                    nursing,
                    other,

                    comment: tempComment,

                    name: name || null,
                    phone: phone || null
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                    }
                });
        }

        // ---------------- SKIP BUTTON ----------------
        function skipContact() {

            if (isLowRating) {
                alert(currentLang === "ar"
                    ? "الاسم ورقم الهاتف مطلوبان"
                    : "Name and phone are required");
                return;
            }

            sendData(null, null);
        }

        fetch("/save_feedback", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                location: "{{ room }}",
                branch: "{{ branch }}",

                rating: tempRating,
                comment: tempComment,

                facility: selectedFacility,
                it: selectedIT,
                medical: selectedMedical,
                nursing: selectedNursing,
                other: selectedOther,

                name: null,
                phone: null
            })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                }
            });


        function showToast(msg) {
            const toast = document.createElement("div");

            toast.innerText = msg;

            toast.style.position = "fixed";
            toast.style.top = "20px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.background = "#1b2a41";
            toast.style.color = "white";
            toast.style.padding = "12px  20px";
            toast.style.borderRadius = "12px";
            toast.style.zIndex = "9999";

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2500);
        }

        function setPopupLang(lang) {

            document.getElementById("popupTitle").innerText =
                i18n.popupTitle[lang];

            document.getElementById("popupText").innerText =
                i18n.popupText[lang];

            document.getElementById("popupName").placeholder =
                i18n.fullName[lang];

            document.getElementById("popupPhone").placeholder =
                i18n.phoneNumber[lang];

            document.getElementById("popupBtn").innerText =
                i18n.submit[lang];

            document.getElementById("skipBtn").innerText =
                i18n.skip[lang];
        }
    </script>
    <div id="toast"></div>
</body>

</html>
