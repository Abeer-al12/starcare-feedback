<!DOCTYPE html>
<html>

<head>
    <title>StarCare Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f6fbfc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 430px;
            padding: 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .10);
        }

        .logo {
            width: 200px;
            height: auto;
            display: block;
            margin: 0 auto 20px;
        }

        h1 {
            color: #1b2a41;
            margin: 15px 0 5px;
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .lang-switch button {
            background: #eafcfd;
            color: #00A79B;
            border: 1px solid #00A79B;
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin: 0;
        }

        .lang-switch button:hover {
            background: #00A79B;
            color: white;
        }

        .title {
            color: #666;
            margin-top: 10px;
            font-size: 16px;
        }

        .room {
            color: #00A79B;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }

        .stars {
            display: flex;
            justify-content: center;
            flex-direction: row-reverse;
            margin: 25px 0;
        }

        .stars input {
            display: none;
        }

        .stars label {
            font-size: 48px;
            color: #d7d7d7;
            cursor: pointer;
            padding: 4px;
            transition: .2s;
        }

        .stars input:checked~label,
        .stars label:hover,
        .stars label:hover~label {
            color: #00A79B;
        }

        #starText {
            color: #777;
            margin-bottom: 18px;
        }

        textarea {
            width: 100%;
            height: 110px;
            border: 1px solid #ddd;
            border-radius: 18px;
            padding: 15px;
            font-size: 15px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: #00A79B;
        }

        .submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 18px;
            background: #00A79B;
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: .3s;
            font-weight: bold;
        }

        .submit-btn:hover {
            background: #00A79B;
        }

        .category-options {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 18px;
            margin: 20px 0;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 90px;
            cursor: pointer;
        }

        .category-item input {
            display: none;
        }

        .category-item span {
            width: 22px;
            height: 22px;
            border: 2px solid #00A79B;
            border-radius: 50%;
            margin-bottom: 8px;
            transition: .3s;
        }

        .category-item input:checked+span {
            background: #00A79B;
            box-shadow: 0 0 0 4px rgba(0, 167, 155, .2);
        }

        .category-item small {
            font-size: 12px;
            line-height: 1.3;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="card">

        <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">



        <div class="lang-switch">
            <button type="button" onclick="setLang('en')">
                English
            </button>

            <button type="button" onclick="setLang('ar')">
                عربي
            </button>
        </div>

        <p class="title" id="titleText">
            Rate our Service
        </p>

        <div class="room">
            {{ room_name }}
        </div>

        <form id="feedbackForm">

            <div class="category-options">

                <label class="category-item">
                    <input type="radio" name="category" value="facility" checked>
                    <span></span>
                    <small id="facilityText">Facility / Maintenance</small>
                </label>

                <label class="category-item">
                    <input type="radio" name="category" value="it">
                    <span></span>
                    <small id="itText">IT</small>
                </label>

                <label class="category-item">
                    <input type="radio" name="category" value="equipment">
                    <span></span>
                    <small id="equipmentText">Medical Equipment</small>
                </label>

                <label class="category-item">
                    <input type="radio" name="category" value="nursing">
                    <span></span>
                    <small id="nursingText">Nursing</small>
                </label>

                <label class="category-item">
                    <input type="radio" name="category" value="other">
                    <span></span>
                    <small id="otherText">Other</small>
                </label>

            </div>
            <div class="stars">

                <input type="radio" name="rating" value="5" id="5" required>
                <label for="5">★</label>

                <input type="radio" name="rating" value="4" id="4">
                <label for="4">★</label>

                <input type="radio" name="rating" value="3" id="3">
                <label for="3">★</label>

                <input type="radio" name="rating" value="2" id="2">
                <label for="2">★</label>

                <input type="radio" name="rating" value="1" id="1">
                <label for="1">★</label>

            </div>

            <!-- <input type="text" name="phone" placeholder="Optional phone number"> -->
            <p id="starText">
                Tap a star to rate
            </p>

            <textarea name="comment" id="commentBox" placeholder="Share your thoughts...">
        </textarea>

            <button class="submit-btn" type="submit">
                <span id="btnText">
                    Submit Feedback
                </span>
            </button>

        </form>

    </div>

    <script>

        const i18n = {
            en: {
                skip: "Skip",
                nameRequired: "Name is required",
                phoneRequired: "Phone number must be 8 digits",
                contactTitle: "Contact Information",
                contactText: "We are sorry your experience was not satisfactory. Please enter your phone number so we can contact you.",
                submit: "Submit"
            },
            ar: {
                skip: "تخطي",
                nameRequired: "الاسم مطلوب",
                phoneRequired: "يجب أن يتكون رقم الهاتف من 8 أرقام",
                contactTitle: "معلومات التواصل",
                contactText: "نعتذر أن تجربتك لم تكن بالمستوى المطلوب، يرجى إدخال رقم الهاتف للتواصل معك.",
                submit: "إرسال"
            }
        };

        let currentLang = "en";
        function setLang(lang) {

            currentLang = lang;

            document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";

            document.getElementById("titleText").innerHTML =
                lang === "ar" ? "قيّم خدمتنا" : "Rate our Service";

            document.getElementById("starText").innerHTML =
                lang === "ar" ? "اضغط على النجوم للتقييم" : "Tap a star to rate";

            document.getElementById("commentBox").placeholder =
                lang === "ar" ? "اكتب ملاحظاتك..." : "Share your thoughts...";

            document.getElementById("btnText").innerHTML =
                lang === "ar" ? "إرسال التقييم" : "Submit Feedback";

            // ⭐ هنا تحطه
            const skipBtn = document.getElementById("skipBtn");
            if (skipBtn) skipBtn.innerText = i18n[lang].skip;

            // popup
            if (popupTitle) {
                popupTitle.innerHTML = i18n[lang].contactTitle;
                popupText.innerHTML = i18n[lang].contactText;
                popupBtn.innerHTML = i18n[lang].submit;
            }
            if (lang === "ar") {

                document.getElementById("catFacility").innerHTML = "المرافق والصيانة";
                document.getElementById("catIT").innerHTML = "تقنية المعلومات";
                document.getElementById("catMedical").innerHTML = "الأجهزة الطبية";
                document.getElementById("catNursing").innerHTML = "التمريض";
                document.getElementById("catOther").innerHTML = "أخرى";

            } else {

                document.getElementById("catFacility").innerHTML = "Facility / Maintenance";
                document.getElementById("catIT").innerHTML = "IT";
                document.getElementById("catMedical").innerHTML = "Medical Equipment";
                document.getElementById("catNursing").innerHTML = "Nursing";
                document.getElementById("catOther").innerHTML = "Other";
            }


        }

    </script>
    <div id="phonePopup" style="display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.45);
            justify-content:center;
            align-items:center;
            z-index:999;">

        <div style="
        background:white;
        width:350px;
        padding:30px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);">

            <h2 id="popupTitle" style="color:#00A79B;margin-top:0;">
                Contact Information
            </h2>

            <p id="popupText" style="color:#666;font-size:14px;margin-bottom:20px;">
                We are sorry your experience was not satisfactory.
                Please enter your phone number so we can contact you.
            </p>

            <input type="text" id="popupName" placeholder="Full Name" style="
                width:100%;
                padding:14px;
                border:1px solid #ddd;
                border-radius:15px;
                font-size:15px;
                box-sizing:border-box;
                outline:none;
                margin-bottom:10px;">

            <input type="text" id="popupPhone" placeholder="Phone Number" style="
                width:100%;
                padding:14px;
                border:1px solid #ddd;
                border-radius:15px;
                font-size:15px;
                box-sizing:border-box;
                outline:none;">

            <button id="popupBtn" onclick="submitLowRating()" style="
                width:100%;
                margin-top:15px;
                padding:14px;
                border:none;
                border-radius:15px;
                background:#00A79B;
                color:white;
                font-size:16px;
                font-weight:bold;
                cursor:pointer;">
                Submit
            </button>

            <button id="skipBtn" onclick="skipContact()" style="
                width:100%;
                margin-top:10px;
                padding:14px;
                border:none;
                border-radius:15px;
                background:#ddd;
                cursor:pointer;">
                Skip
            </button>
        </div>
    </div>
    <script>

        let tempRating = 0;
        let tempComment = "";
        let isLowRating = false;

        document.getElementById("feedbackForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let ratingEl = document.querySelector('input[name="rating"]:checked');
            if (!ratingEl) return alert("اختر تقييم");

            let rating = parseInt(ratingEl.value);
            let comment = document.getElementById("commentBox").value;

            tempRating = rating;
            tempComment = comment;

            // ⭐ LOW rating (1-3) = إجباري popup
            if (rating <= 3) {
                isLowRating = true;
                document.getElementById("phonePopup").style.display = "flex";
            }

            // ⭐ HIGH rating (4-5) = اختياري popup
            else {
                isLowRating = false;
                document.getElementById("phonePopup").style.display = "flex";
            }
        });


        // ---------------- SUBMIT LOW RATING ----------------
        function submitLowRating() {

            let name = document.getElementById("popupName").value.trim();
            let phone = document.getElementById("popupPhone").value.trim();

            // ⭐ 1-3 إجباري
            if (isLowRating) {

                if (!name || name.length < 2) {
                    alert("Name required");
                    return;
                }

                if (phone.length !== 8 || isNaN(phone)) {
                    alert("Phone must be 8 digits");
                    return;
                }
            }

            fetch("/save_low_rating", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    location: "{{ room }}",
                    rating: tempRating,
                    comment: tempComment,
                    name: name || null,
                    phone: phone || null
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                    }
                });
        }
        // ---------------- SKIP BUTTON ----------------
        function skipContact() {

            // ❌ ممنوع skip إذا 1–3
            if (isLowRating) {
                alert("الاسم والرقم إجباري");
                return;
            }

            fetch("/save_low_rating", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    location: "{{ room }}",
                    rating: tempRating,
                    comment: tempComment,
                    name: null,
                    phone: null
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                    }
                });
        }
    </script>

</body>

</html>
