<!DOCTYPE html>
<html>

<head>
    <title>StarCare Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f6fbfc;
        }

        .card {
            background: white;
            width: 430px;
            margin: 40px auto;
            padding: 35px;
            border-radius: 30px;
            text-align: center;
        }

        .logo {
            width: 200px;
            height: auto;
            display: block;
            margin: 0 auto 20px;
        }

        h1 {
            color: #1b2a41;
            margin: 15px 0 5px;
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .lang-switch button {
            background: #eafcfd;
            color: #00A79B;
            border: 1px solid #00A79B;
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin: 0;
        }

        .lang-switch button:hover {
            background: #00A79B;
            color: white;
        }

        .title {
            color: #666;
            margin-top: 10px;
            font-size: 16px;
        }

        .room {
            color: #00A79B;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }

        .stars {
            display: flex;
            justify-content: center;
            flex-direction: row-reverse;
            margin: 25px 0;
        }

        .stars input {
            display: none;
        }

        .stars label {
            font-size: 48px;
            color: #d7d7d7;
            cursor: pointer;
            padding: 4px;
            transition: .2s;
        }

        .stars input:checked~label,
        .stars label:hover,
        .stars label:hover~label {
            color: #00A79B;
        }

        #starText {
            color: #777;
            margin-bottom: 18px;
        }

        textarea {
            width: 100%;
            height: 110px;
            border: 1px solid #ddd;
            border-radius: 18px;
            padding: 15px;
            font-size: 15px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: #00A79B;
        }

        .submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 18px;
            background: #00A79B;
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: .3s;
            font-weight: bold;
        }

        .submit-btn:hover {
            background: #00A79B;
        }

        .question-block {
            margin-bottom: 25px;
            text-align: start;
        }

        .question-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1b2a41;
        }


        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        input:focus {
            border-color: #00A79B;
        }

        #phonePopup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #phonePopup>div {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        #popupName,
        #popupPhone {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        #popupBtn,
        #skipBtn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #popupBtn {
            background: #00A79B;
            color: white;
        }

        #skipBtn {
            background: #eee;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b2a41;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -10px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }


        @media (max-width: 600px) {

            .card {
                width: 92%;
                padding: 20px;
            }

            .category-item {
                font-size: 14px;
            }

            .stars label {
                font-size: 40px;
            }
        }

        

        .category-options {
            display: none;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 12px;
        }

        .category-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            gap: 6px;
        }

        /* نخفي radio الحقيقي */
        .category-item input {
            display: none;
        }

        /* الدائرة الوحيدة */
        .category-item span {
            width: 14px;
            height: 14px;
            border: 2px solid #aaa;
            border-radius: 50%;
            display: inline-block;
            transition: 0.2s;
        }

        /* لما ينختار */
        .category-item input:checked+span {
            background: #00A79B;
            border-color: #00A79B;
        }
    </style>
</head>
<div id="errorMsg" style="
    display:none;
    background:#ffdddd;
    color:#b30000;
    padding:10px;
    margin-bottom:15px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
"></div>

<body>

    <div class="card">

        <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">



        <div class="lang-switch">
            <button type="button" onclick="setLang('en')">
                English
            </button>

            <button type="button" onclick="setLang('ar')">
                عربي
            </button>
        </div>

        <!-- <p class="title" id="titleText">
            Rate our Service
        </p> -->

        <div class="room">
            {{ room_name }}
        </div>

        <form id="feedbackForm">

            <div class="question-block">

                <div class="question-title" data-key="qCategory">
                    What would you like to rate?
                </div>

                <div class="category-options">

                    <label class="category-item">
                        <input type="radio" name="category" value="facility">
                        <span></span>
                        <span data-key="catFacility">Facility / Maintenance</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="category" value="it">
                        <span></span>
                        <span data-key="catIT">IT</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="category" value="medical">
                        <span></span>
                        <span data-key="catMedical">Medical Equipment</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="category" value="nursing">
                        <span></span>
                        <span data-key="catNursing">Nursing</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="category" value="other">
                        <span></span>
                        <span data-key="catOther">Other</span>
                    </label>

                </div>
            </div>

            <div class="question-block">

                <div class="question-title" data-key="qSpeed">
                    Service Speed
                </div>

                <div class="category-options">

                    <label class="category-item">
                        <input type="radio" name="speed" value="fast">
                        <span></span>
                        <span data-key="speedFast">Fast</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="speed" value="average">
                        <span></span>
                        <span data-key="speedAverage">Average</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="speed" value="slow">
                        <span></span>
                        <span data-key="speedSlow">Slow</span>
                    </label>

                </div>
            </div>

            <div class="question-block">

                <div class="question-title" data-key="qBehavior">
                    Staff Behavior
                </div>

                <div class="category-options">

                    <label class="category-item">
                        <input type="radio" name="behavior" value="excellent">
                        <span></span>
                        <span data-key="behExcellent">Excellent</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="behavior" value="good">
                        <span></span>
                        <span data-key="behGood">Good</span>
                    </label>

                    <label class="category-item">
                        <input type="radio" name="behavior" value="bad">
                        <span></span>
                        <span data-key="behBad">Bad</span>
                    </label>

                </div>
            </div>
            <div class="question-block">

                <div class="question-title" data-key="qRating">
                    Rating
                </div>

                <div class="stars">
                    <input type="radio" name="rating" value="5" id="5" required>
                    <label for="5">★</label>

                    <input type="radio" name="rating" value="4" id="4">
                    <label for="4">★</label>

                    <input type="radio" name="rating" value="3" id="3">
                    <label for="3">★</label>

                    <input type="radio" name="rating" value="2" id="2">
                    <label for="2">★</label>

                    <input type="radio" name="rating" value="1" id="1">
                    <label for="1">★</label>
                </div>

                <!-- <p id="starText">Tap a star to rate</p> -->
            </div>

            <!-- <input type="text" name="phone" placeholder="Optional phone number"> -->
            <!-- <p id="starText">
                Tap a star to rate
            </p> -->

            <div class="question-block">

                <div class="question-title" data-key="qComment">
                    Your Comment
                </div>

                <textarea name="comment" id="commentBox" data-placeholder="qComment"></textarea>

            </div>

            <button class="submit-btn" type="submit">
                <span id="btnText">
                    Submit Feedback
                </span>
            </button>

        </form>

    </div>

    <script>

        const i18n = {
            qCategory: { en: "What would you like to rate?", ar: "ماذا تريد أن تقيم؟" },
            qSpeed: { en: "Service Speed", ar: "سرعة الخدمة" },
            qBehavior: { en: "Staff Behavior", ar: "سلوك الموظفين" },
            qRating: { en: "Rating", ar: "التقييم" },
            qComment: { en: "Your Comment", ar: "ملاحظاتك" },

            catFacility: { en: "Facility / Maintenance", ar: "المرافق / الصيانة" },
            catIT: { en: "IT", ar: "تقنية المعلومات" },
            catMedical: { en: "Medical Equipment", ar: "الأجهزة الطبية" },
            catNursing: { en: "Nursing", ar: "التمريض" },
            catOther: { en: "Other", ar: "أخرى" },

            speedFast: { en: "Fast", ar: "سريع" },
            speedAverage: { en: "Average", ar: "متوسط" },
            speedSlow: { en: "Slow", ar: "بطيء" },

            behExcellent: { en: "Excellent", ar: "ممتاز" },
            behGood: { en: "Good", ar: "جيد" },
            behBad: { en: "Bad", ar: "سيئ" },

            submit: { en: "Submit Feedback", ar: "إرسال التقييم" },

            popupTitle: {
                en: "Contact Information",
                ar: "معلومات التواصل"
            },

            popupText: {
                en: "We are sorry your experience was not satisfactory. Please enter your phone number so we can contact you.",
                ar: "نعتذر أن تجربتك لم تكن بالمستوى المطلوب، يرجى إدخال رقم الهاتف للتواصل معك."
            },

            fullName: {
                en: "Full Name",
                ar: "الاسم الكامل"
            },

            phoneNumber: {
                en: "Phone Number",
                ar: "رقم الهاتف"
            },

            skip: {
                en: "Skip",
                ar: "تخطي"
            },

            messages: {
                en: {
                    required: "⚠️ Please answer all questions",
                    success: "Submitted successfully",
                    nameRequired: "Name is required",
                    phoneRequired: "Phone must be 8 digits"
                },
                ar: {
                    required: "⚠️ لازم تجاوب على كل الأسئلة",
                    success: "تم الإرسال بنجاح",
                    nameRequired: "الاسم مطلوب",
                    phoneRequired: "رقم الهاتف لازم يكون 8 أرقام"
                }
            }
        };

        let currentLang = "en";
        function setLang(lang) {
            currentLang = lang;

            document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";

            // النصوص
            document.querySelectorAll("[data-key]").forEach(el => {
                const key = el.getAttribute("data-key");
                if (i18n[key]) {
                    el.innerText = i18n[key][lang];
                }
            });

            // placeholders
            document.querySelectorAll("[data-placeholder]").forEach(el => {
                const key = el.getAttribute("data-placeholder");
                if (i18n[key]) {
                    el.placeholder = i18n[key][lang];
                }
            });
        }

    </script>
    <div id="phonePopup" style="display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.45);
        justify-content:center;
        align-items:center;
        z-index:999;">

        <div style="
    background:white;
    width:350px;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);">

            <h2 id="popupTitle"></h2>

            <p id="popupText"></p>

            <input type="text" id="popupName" placeholder="">

            <input type="text" id="popupPhone" placeholder="">

            <button id="popupBtn" onclick="submitLowRating()"></button>

            <button id="skipBtn" onclick="skipContact()"></button>

        </div>
    </div>

    <script>

        let tempRating = 0;
        let tempComment = "";
        let isLowRating = false;

        function showError(msg) {
            const box = document.getElementById("errorMsg");
            box.innerText = msg;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3000);
        }

        document.getElementById("feedbackForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let category = document.querySelector('input[name="category"]:checked');
            let speed = document.querySelector('input[name="speed"]:checked');
            let behavior = document.querySelector('input[name="behavior"]:checked');
            let rating = document.querySelector('input[name="rating"]:checked');

            // 🚨 إذا ناقص شيء
            if (!rating || !category || !speed || !behavior) {
                showToast(i18n.messages[currentLang].required);
                return;
            }
            let ratingValue = parseInt(rating.value);

            tempRating = ratingValue;
            tempComment = document.getElementById("commentBox").value;

            if (ratingValue <= 3) {
                isLowRating = true;
            } else {
                isLowRating = false;
            }

            document.getElementById("phonePopup").style.display = "flex";
        });

        // ---------------- SUBMIT LOW RATING ----------------
        function submitLowRating() {

            let name = document.getElementById("popupName").value.trim();
            let phone = document.getElementById("popupPhone").value.trim();

            // لو منخفض (1-3) لازم الاسم والرقم
            if (isLowRating) {
                if (!name) {
                    alert("Name required");
                    return;
                }

                if (!/^\d{8}$/.test(phone)) {
                    alert("Phone must be 8 digits");
                    return;
                }
            }

            sendData(name, phone);
        }

        fetch("/save_feedback", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                location: "{{ room }}",
                branch: "{{ branch }}",
                rating: tempRating,
                comment: tempComment,

                category: document.querySelector('input[name="category"]:checked')?.value,
                speed: document.querySelector('input[name="speed"]:checked')?.value,
                behavior: document.querySelector('input[name="behavior"]:checked')?.value,

                name: name || null,
                phone: phone || null
            })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                }
            });

        // ---------------- SKIP BUTTON ----------------
        function skipContact() {

            if (isLowRating) {
                alert("الاسم والرقم إجباري");
                return;
            }

            fetch("/save_feedback", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    location: "{{ room }}",
                    branch: "{{ branch }}",

                    rating: tempRating,
                    comment: tempComment,

                    category: document.querySelector('input[name="category"]:checked')?.value,
                    speed: document.querySelector('input[name="speed"]:checked')?.value,
                    behavior: document.querySelector('input[name="behavior"]:checked')?.value,

                    name: null,
                    phone: null
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = `/thankyou/{{ branch }}/{{ room }}`;
                    }
                });
        }

        function showToast(msg) {
            const toast = document.createElement("div");

            toast.innerText = msg;

            toast.style.position = "fixed";
            toast.style.top = "20px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.background = "#1b2a41";
            toast.style.color = "white";
            toast.style.padding = "12px 20px";
            toast.style.borderRadius = "12px";
            toast.style.zIndex = "9999";

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2500);
        }
    </script>
    <div id="toast"></div>
</body>

</html>
