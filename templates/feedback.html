<!DOCTYPE html>
<html>
<head>
    <title>StarCare Feedback</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f6fbfc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:430px;
            padding:35px;
            border-radius:30px;
            text-align:center;
            box-shadow:0 8px 25px rgba(0,0,0,.10);
        }

        .logo{
            width:85px;
            height:85px;
            background:#59e3ec;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            font-size:40px;
            color:white;
        }

        h1{
            color:#1b2a41;
        }

        .lang-switch{
            display:flex;
            justify-content:center;
            gap:10px;
            margin:15px 0;
        }

        .lang-switch button{
            background:#eafcfd;
            color:#59e3ec;
            border:1px solid #59e3ec;
            padding:8px 18px;
            border-radius:12px;
            cursor:pointer;
        }

        .room{
            color:#59e3ec;
            font-size:20px;
            font-weight:bold;
            margin:15px 0;
        }

        .stars label{
            font-size:48px;
            color:#d7d7d7;
        }

        textarea{
            width:100%;
            height:110px;
            border-radius:18px;
            padding:15px;
        }

        .submit-btn{
            width:100%;
            margin-top:20px;
            padding:15px;
            border:none;
            border-radius:18px;
            background:#59e3ec;
            color:white;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="logo">❤</div>

    <h1>StarCare Hospital</h1>

    <div class="room">
        {{ room_name }}
    </div>

    <form method="POST">

        <div class="stars">
            <input type="radio" name="rating" value="5" required> ★
            <input type="radio" name="rating" value="4"> ★
            <input type="radio" name="rating" value="3"> ★
            <input type="radio" name="rating" value="2"> ★
            <input type="radio" name="rating" value="1"> ★
        </div>

        <textarea name="comment" placeholder="Share your thoughts..."></textarea>

        <button class="submit-btn">Submit Feedback</button>

    </form>

</div>

</body>
</html>
