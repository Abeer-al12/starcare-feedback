<!DOCTYPE html>
<html>
<head>
    <title>StarCare Feedback</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f6fbfc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:430px;
            padding:35px;
            border-radius:30px;
            text-align:center;
            box-shadow:0 8px 25px rgba(0,0,0,.10);
        }

        .logo{
    width: 200px;
    height:auto;
    display:block;
    margin:0 auto 20px;
        }

        h1{
            color:#1b2a41;
            margin:15px 0 5px;
        }

        .lang-switch{
            display:flex;
            justify-content:center;
            gap:10px;
            margin:15px 0;
        }

        .lang-switch button{
            background:#eafcfd;
            color:#00A79B;
            border:1px solid #00A79B;
            padding:8px 18px;
            border-radius:12px;
            cursor:pointer;
            font-size:14px;
            width:auto;
            margin:0;
        }

        .lang-switch button:hover{
            background:#00A79B;
            color:white;
        }

        .title{
            color:#666;
            margin-top:10px;
            font-size:16px;
        }

        .room{
            color:#00A79B;
            font-size:20px;
            font-weight:bold;
            margin:15px 0;
        }

        .stars{
            display:flex;
            justify-content:center;
            flex-direction:row-reverse;
            margin:25px 0;
        }

        .stars input{
            display:none;
        }

        .stars label{
            font-size:48px;
            color:#d7d7d7;
            cursor:pointer;
            padding:4px;
            transition:.2s;
        }

        .stars input:checked ~ label,
        .stars label:hover,
        .stars label:hover ~ label{
            color:#00A79B;
        }

        #starText{
            color:#777;
            margin-bottom:18px;
        }

        textarea{
            width:100%;
            height:110px;
            border:1px solid #ddd;
            border-radius:18px;
            padding:15px;
            font-size:15px;
            resize:none;
            box-sizing:border-box;
            outline:none;
        }

        textarea:focus{
            border-color:#00A79B;
        }

        .submit-btn{
            width:100%;
            margin-top:20px;
            padding:15px;
            border:none;
            border-radius:18px;
            background:#00A79B;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:.3s;
            font-weight:bold;
        }

        .submit-btn:hover{
            background:#00A79B;
        }

    </style>
</head>

<body>

<div class="card">

    <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">

    

    <div class="lang-switch">
        <button type="button" onclick="setLang('en')">
            English
        </button>

        <button type="button" onclick="setLang('ar')">
            عربي
        </button>
    </div>

    <p class="title" id="titleText">
        Rate our Service
    </p>

    <div class="room">
        {{ room_name }}
    </div>

        <form id="feedbackForm">
            

        <div class="stars">

            <input type="radio" name="rating" value="5" id="5" required>
            <label for="5">★</label>

            <input type="radio" name="rating" value="4" id="4">
            <label for="4">★</label>

            <input type="radio" name="rating" value="3" id="3">
            <label for="3">★</label>

            <input type="radio" name="rating" value="2" id="2">
            <label for="2">★</label>

            <input type="radio" name="rating" value="1" id="1">
            <label for="1">★</label>

        </div>

        <input type="text" name="phone" placeholder="Optional phone number">
        <p id="starText">
            Tap a star to rate
        </p>

        <textarea
            name="comment"
            id="commentBox"
            placeholder="Share your thoughts...">
        </textarea>

        <button class="submit-btn" type="submit">
            <span id="btnText">
                Submit Feedback
            </span>
        </button>

    </form>

</div>

<script>

function setLang(lang){

    if(lang=="ar"){

        document.documentElement.dir="rtl";

        document.getElementById("titleText").innerHTML="قيّم خدمتنا";
        document.getElementById("starText").innerHTML="اضغط على النجوم للتقييم";
        document.getElementById("commentBox").placeholder="اكتب ملاحظاتك...";
        document.getElementById("btnText").innerHTML="إرسال التقييم";
    }

    else{

        document.documentElement.dir="ltr";

        document.getElementById("titleText").innerHTML="Rate our Service";
        document.getElementById("starText").innerHTML="Tap a star to rate";
        document.getElementById("commentBox").placeholder="Share your thoughts...";
        document.getElementById("btnText").innerHTML="Submit Feedback";
    }
    
}



</script>
<div id="phonePopup" style="display:none; position:fixed; top:0; left:0; 
width:100%; height:100%; background:rgba(0,0,0,0.5);
justify-content:center; align-items:center;">

    <div style="background:white; padding:20px; border-radius:15px; width:300px; text-align:center;">
        <h3>Enter your phone number</h3>

        <input type="text" id="popupPhone" placeholder="Phone number"
               style="width:100%; padding:10px; margin-top:10px;">

        <button onclick="submitLowRating()"
                style="margin-top:10px; padding:10px; width:100%;">
            Submit
        </button>
    </div>
</div>
</div>
<script>

let tempRating = 0;
let tempComment = "";

document.getElementById("feedbackForm").addEventListener("submit", function(e){
    e.preventDefault();

    let ratingEl = document.querySelector('input[name="rating"]:checked');

    if(!ratingEl){
        alert("Please select rating");
        return;
    }

    let rating = parseInt(ratingEl.value);
    let comment = document.getElementById("commentBox").value;

    fetch("/feedback/{{ location }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `rating=${rating}&comment=${comment}`
    })
    .then(res => res.json())
    .then(data => {

        if(data.need_phone){
            tempRating = data.rating;
            tempComment = data.comment;

            document.getElementById("phonePopup").style.display = "flex";
        }
        else{
            window.location.href = "/thankyou/{{ location }}";
        }
    });
});


function submitLowRating(){

    let phone = document.getElementById("popupPhone").value;

    if(phone.length !== 8 || isNaN(phone)){
        alert("Phone must be 8 digits");
        return;
    }

    fetch("/save_low_rating", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            location: "{{ location }}",
            rating: tempRating,
            comment: tempComment,
            phone: phone
        })
    })
    .then(() => {
        window.location.href = "/thankyou/{{ location }}";
    });
}

</script>

</body>
</html>
