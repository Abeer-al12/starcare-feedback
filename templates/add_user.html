<!DOCTYPE html>
<html>

<head>
    <title>Add User - StarCare</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f6fbfc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 450px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #00A79B;
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
        }

        label {
            font-size: 13px;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00A79B;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background: #008f88;
        }

        .multi {
            height: 90px;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>Add New User</h2>

        <form method="POST">

            <input name="username" placeholder="Username" required>
            <input name="password" placeholder="Password" required>

            <select name="role" required>
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="doctor">Doctor</option>
                <option value="nurse">Nurse</option>
            </select>

            <!-- BRANCH -->
            <label>Allowed Branches</label>
            <select name="branches" multiple class="multi">
                <option value="alhail">Al Hail</option>
                <option value="mabella">Mabella</option>
            </select>

            <!-- LOCATION -->
            <label>Allowed Locations</label>
            <select name="locations" multiple class="multi">
                <option value="xray108">X-Ray 108</option>
                <option value="reception">Reception</option>
                <option value="lab201">Lab 201</option>
                <option value="consultation">Consultation</option>
            </select>

            <button type="submit">Add User</button>

        </form>

    </div>

</body>

</html>
