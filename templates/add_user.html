<!DOCTYPE html>
<html>
<head>
    <title>Add User - StarCare</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f6fbfc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:420px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }

        .logo{
    width: 200px;
    height:auto;
    display:block;
    margin:0 auto 20px;
        }
        h2{
            color:#00A79B;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:12px;
            outline:none;
        }

        select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:12px;
            outline:none;

            /* 👇 هذا يخلي dropdown جميل */
            background:#fff;
            appearance:none;
            cursor:pointer;
        }

        button{
            width:100%;
            padding:12px;
            background:#00A79B;
            color:white;
            border:none;
            border-radius:12px;
            cursor:pointer;
            margin-top:10px;
            font-weight:bold;
        }

        button:hover{
            background:#008f88;
        }

        .back{
            display:block;
            margin-top:15px;
            color:#00A79B;
            text-decoration:none;
        }

        .back:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="card">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='logowhite.jpeg') }}" class="logo">

    <h2>Add New User</h2>

    <form method="POST">

        <input name="username" placeholder="Username" required>
        <input name="password" placeholder="Password" required>

        <!-- Dropdown مرتب -->
        <select name="role" required>
            <option value="">Select Role</option>
            <option value="admin">Admin</option>
            <option value="it">IT Department</option>
            <option value="nurse">Nurse</option>
            <option value="doctor">Doctor</option>
            <option value="alhail">Al Hail</option>
            <option value="mabella">Mabella</option>
        </select>

        <button type="submit">Add User</button>

    </form>

    <a href="/manage_users" class="back">⬅ Back to Users</a>
</div>

</body>
</html>
