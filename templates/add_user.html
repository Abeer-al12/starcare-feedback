<!DOCTYPE html>
<html>
<head>
    <title>Add User</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f7fa;
            margin:0;
        }

        .container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        h2{
            color:#00A79B;
        }

        input, select{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:10px;
            background:#00A79B;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#00A79B;
        }

        a{
            display:block;
            margin-top:10px;
            color:#00A79B;
            text-decoration:none;
        }
        
       .back-link{
    display:block;
    margin-top:10px;
    color:#00A79B;
    text-decoration:none;
    font-weight:bold;
        }

        .back-link:hover{
    text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Add New User</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" placeholder="Password" required>

        <select name="role">
            <option value="admin">Admin</option>
            <option value="it">IT</option>
            <option value="alhail">Al Hail</option>
            <option value="mabella">Mabella</option>
        </select>

        <button type="submit">Add User</button>
    </form>

    <a href="/manage_users" class="back-link">Back to Users</a>
    <a href="/admin" class="back-link">Back to Dashboard</a>
</div>

</body>
</html>
