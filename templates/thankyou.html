<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f6fbfc;
            font-family:Arial;
        }

        .card{
            background:white;
            width:420px;
            padding:40px;
            border-radius:30px;
            text-align:center;
            box-shadow:0 8px 25px rgba(0,0,0,.10);
        }

        .icon{
            width:90px;
            height:90px;
            background:#59e3ec;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            font-size:42px;
            color:white;
            box-shadow:0 4px 15px rgba(89,227,236,.45);
        }

        h1{
            color:#1b2a41;
            margin:20px 0 10px;
        }

        p{
            color:#666;
            font-size:17px;
            line-height:1.5;
        }

        .location{
            margin:20px 0;
            color:#59e3ec;
            font-weight:bold;
            font-size:19px;
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            background:#59e3ec;
            color:white;
            padding:14px 28px;
            border-radius:18px;
            transition:.3s;
            font-weight:bold;
        }

        .btn:hover{
            background:#43d2dc;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="icon">❤</div>

    <h1>Thank You!</h1>

    <p>
        Your feedback helps us improve and provide better care.
    </p>

    <div class="location">
    {{ room_name }}    
</div>

   

</div>

</body>
</html>
