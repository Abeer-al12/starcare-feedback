<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f6fbfc;
            font-family:Arial;
        }

        .card{
            background:white;
            width:420px;
            padding:40px;
            border-radius:30px;
            text-align:center;
            box-shadow:0 8px 25px rgba(0,0,0,.10);
        }

        .logo{
    width: 200px;
    height:auto;
    display:block;
    margin:0 auto 20px;
        }

        h1{
            color:#1b2a41;
            margin:20px 0 10px;
        }

        p{
            color:#666;
            font-size:17px;
            line-height:1.5;
        }

        .location{
            margin:20px 0;
            color:#00A79B;
            font-weight:bold;
            font-size:19px;
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            background:#00A79B;
            color:white;
            padding:14px 28px;
            border-radius:18px;
            transition:.3s;
            font-weight:bold;
        }

        .btn:hover{
            background:#00A79B;
        }
    </style>
</head>
<body>

<div class="card">

    <img src="{{ url_for('static', filename='LOGO.webp') }}" class="logo">

    <h1>Thank You!</h1>

    <p>
        Your feedback helps us improve and provide better care.
    </p>

    <div class="location">
    {{ room_name }}    
</div>

   

</div>

</body>

</html>
