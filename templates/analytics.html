<!DOCTYPE html>
<html>
<head>
    <title>StarCare Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f6fbfc;
            transition:0.3s;
        }

        /* Sidebar */
        .sidebar{
            position:fixed;
            left:0;
            top:0;
            width:240px;
            height:100%;
            background:#59e3ec;
            color:white;
            padding-top:30px;
            box-shadow:4px 0 15px rgba(0,0,0,.08);
        }

        .logo{
            text-align:center;
            font-size:28px;
            font-weight:bold;
            margin-bottom:35px;
        }

        .menu a{
            display:block;
            color:white;
            text-decoration:none;
            padding:16px 28px;
        }

        .menu a:hover{
            background:rgba(255,255,255,.18);
        }

        /* Main */
        .main{
            margin-left:240px;
            padding:35px;
        }

        h1{
            color:#1b2a41;
        }

        /* Cards */
        .cards{
            display:flex;
            gap:20px;
            margin-bottom:25px;
        }

        .card{
            background:white;
            flex:1;
            padding:25px;
            border-radius:25px;
            box-shadow:0 5px 18px rgba(0,0,0,.08);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h3{
            margin:0;
            color:#777;
        }

        .card h2{
            color:#59e3ec;
            margin-top:12px;
        }

        /* Charts */
        canvas{
            background:white;
            padding:20px;
            border-radius:25px;
            box-shadow:0 5px 18px rgba(0,0,0,.08);
            margin-bottom:25px;
        }

        /* RTL */
        body[dir="rtl"]{
            text-align:right;
        }

        body[dir="rtl"] .sidebar{
            right:0;
            left:auto;
        }

        body[dir="rtl"] .main{
            margin-right:240px;
            margin-left:0;
        }
.charts{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.charts{
    display:flex;
    gap:20px;
    margin-top:20px;
    align-items:stretch;
}

.chart-box{
    flex:1;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);

    /* مهم جدًا */
    display:flex;
    justify-content:center;
    align-items:center;
}

/* هذا أهم إصلاح */
canvas{
    width:100% !important;
    height:320px !important;
}
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <div class="logo">❤ StarCare</div>

    <div class="menu">
        <a href="/admin">Dashboard</a>
        <a href="/analytics">Analytics</a>
        <a href="/qr_dashboard">QR Dashboard</a>
        <a href="/logout">Logout</a>
    </div>

</div>

<!-- Main -->
<div class="main">

    <h1>Analytics Dashboard</h1>

    <!-- Cards -->
    <div class="cards">

        <div class="card">
            <h3>Total Locations</h3>
            <h2>{{ data|length }}</h2>
        </div>

        <div class="card">
            <h3>Total Feedback</h3>
            <h2>
                {{ data | sum(attribute='count') }}
            </h2>
        </div>

    </div>

    <div class="charts">

    <div class="chart-box">
        <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="pieChart"></canvas>
    </div>

</div>
</div>

<script>

let labels = [
    {% for i in data %}
        "{{ i.location }}",
    {% endfor %}
];

let counts = [
    {% for i in data %}
        {{ i.count }},
    {% endfor %}
];

let avgs = [
    {% for i in data %}
        {{ i.avg }},
    {% endfor %}
];


// BAR
new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Total Feedback',
            data: counts,
            backgroundColor: '#59e3ec'
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

// PIE
new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: labels,
        datasets: [{
            label: 'Average Rating',
            data: avgs,
            backgroundColor: [
                '#59e3ec','#2d7ff9','#f7b500','#ff6b6b',
                '#8e44ad','#1abc9c','#e67e22'
            ]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
function setLang(lang){

    localStorage.setItem("lang", lang);

    document.body.dir = (lang === "ar") ? "rtl" : "ltr";

    document.querySelector("h1").innerText =
        (lang === "ar") ? "التحليلات" : "Analytics Dashboard";
}

window.onload = function(){
    let lang = localStorage.getItem("lang") || "en";
    setLang(lang);
}
</script>

</body>
</html>
