<!DOCTYPE html>
<html>
<head>
    <title>StarCare Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f6fbfc;
            transition:0.3s;
        }

        /* Sidebar */
        .sidebar{
            position:fixed;
            left:0;
            top:0;
            width:240px;
            height:100%;
            background:#00A79B;
            color:white;
            padding-top:30px;
            box-shadow:4px 0 15px rgba(0,0,0,.08);
        }

        .logo{
    width: 200px;
    height:auto;
    display:block;
    margin:0 auto 20px;
        }


        .menu a{
            display:block;
            color:white;
            text-decoration:none;
            padding:16px 28px;
        }

        .menu a:hover{
            background:rgba(255,255,255,.18);
        }

        /* Main */
        .main{
            margin-left:240px;
            padding:35px;
        }

        h1{
            color:#1b2a41;
        }

        /* Cards */
        .cards{
            display:flex;
            gap:20px;
            margin-bottom:25px;
        }

        .card{
            background:white;
            flex:1;
            padding:25px;
            border-radius:25px;
            box-shadow:0 5px 18px rgba(0,0,0,.08);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h3{
            margin:0;
            color:#777;
        }

        .card h2{
            color:#00A79B;
            margin-top:12px;
        }

        /* Charts */
        canvas{
            background:white;
            padding:20px;
            border-radius:25px;
            box-shadow:0 5px 18px rgba(0,0,0,.08);
            margin-bottom:25px;
        }

        /* RTL */
        body[dir="rtl"]{
            text-align:right;
        }

        body[dir="rtl"] .sidebar{
            right:0;
            left:auto;
        }

        body[dir="rtl"] .main{
            margin-right:240px;
            margin-left:0;
        }
.charts{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.charts{
    display:flex;
    gap:20px;
    margin-top:20px;
    align-items:stretch;
}

.chart-box{
    flex:1;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);

    /* مهم جدًا */
    display:flex;
    justify-content:center;
    align-items:center;
}

/* هذا أهم إصلاح */
canvas{
    width:100% !important;
    height:320px !important;
}

.lang-switch{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:20px;
}

.lang-switch button{
    background:white;
    color:#00A79B;
    border:2px solid #00A79B;
    padding:10px 18px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.lang-switch button:hover{
    background:#00A79B;
    color:white;
}
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <img src="{{ url_for('static', filename='logowhite.jpeg') }}" class="logo">

    <div class="menu">
    <a id="menuDashboard" href="/admin">Dashboard</a>
    <a id="menuAnalytics" href="/analytics">Analytics</a>
    <a id="menuQR" href="/qr_dashboard">QR Dashboard</a>
    <a id="menuLogout" href="/logout">Logout</a>
</div>

</div>

<!-- Main -->
<div class="main">

    <div class="lang-switch">
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('ar')">عربي</button>
</div>

    <h1>Analytics Dashboard</h1>

    <!-- Cards -->
    <div class="cards">

    <div class="card">
        <h3 id="card1">Total Locations</h3>
        <h2>{{ data|length }}</h2>
    </div>

    <div class="card">
        <h3 id="card2">Total Feedback</h3>
        <h2>{{ data | sum(attribute='count') }}</h2>
    </div>

    <div class="card">
        <h3 id="card3">Best Room</h3>
        <h2 id="bestRoom">-</h2>
    </div>

    <div class="card">
        <h3 id="card4">Needs Attention</h3>
        <h2 id="worstRoom">-</h2>
    </div>

    <div class="card">
    <h3 id="card5">Overall Status</h3>
    <h2 id="overallStatus">-</h2>
</div>

</div>

    <div class="charts">

    <div class="chart-box">
        <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="pieChart"></canvas>
    </div>

</div>
<div class="chart-box" style="margin-top:20px;">
    <canvas id="ratingChart"></canvas>
</div>
<div class="card" style="margin-top:20px;">

    <h3 id="alertTitle">Rooms Requiring Attention 🚨</h3>

    <ul id="alerts"></ul>

</div>
</div>

<script>

let labels = [
    {% for i in data %}
        "{{ i.location }}",
    {% endfor %}
];

let counts = [
    {% for i in data %}
        {{ i.count }},
    {% endfor %}
];

let avgs = [
    {% for i in data %}
        {{ i.avg }},
    {% endfor %}
];


// BAR
new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Total Feedback',
            data: counts,
            backgroundColor: '#59e3ec'
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

// PIE
new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: labels,
        datasets: [{
            label: 'Average Rating',
            data: avgs,
            backgroundColor: [
                '#59e3ec','#2d7ff9','#f7b500','#ff6b6b',
                '#8e44ad','#1abc9c','#e67e22'
            ]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
new Chart(document.getElementById("ratingChart"), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Average Rating',
            data: avgs,
            borderColor: '#59e3ec',
            fill: false,
            tension: 0.3
        }]
    },
    options: {
        responsive:true,
        maintainAspectRatio:false
    }
});
function setLang(lang){

    localStorage.setItem("lang", lang);

    document.body.dir = (lang === "ar") ? "rtl" : "ltr";

    document.querySelector("h1").innerText =
        (lang === "ar") ? "التحليلات" : "Analytics Dashboard";

    document.getElementById("menuDashboard").innerText =
        (lang === "ar") ? "لوحة التحكم" : "Dashboard";

    document.getElementById("menuAnalytics").innerText =
        (lang === "ar") ? "التحليلات" : "Analytics";

    document.getElementById("menuQR").innerText =
        (lang === "ar") ? "لوحة QR" : "QR Dashboard";

    document.getElementById("menuLogout").innerText =
        (lang === "ar") ? "تسجيل الخروج" : "Logout";

    document.getElementById("card1").innerText =
    (lang === "ar") ? "إجمالي الأقسام" : "Total Locations";

    document.getElementById("card2").innerText =
    (lang === "ar") ? "إجمالي التقييمات" : "Total Feedback";

    document.getElementById("card3").innerText =
    (lang === "ar") ? "أفضل قسم" : "Best Room";

    document.getElementById("card4").innerText =
    (lang === "ar") ? "يحتاج متابعة" : "Needs Attention";

    document.getElementById("card5").innerText =
    (lang === "ar") ? "الحالة العامة" : "Overall Status";

    document.getElementById("alertTitle").innerText =
    (lang === "ar")
    ? "الأقسام التي تحتاج متابعة 🚨"
    : "Rooms Requiring Attention 🚨";
}

window.onload = function(){
    let lang = localStorage.getItem("lang") || "en";
    setLang(lang);
}

let maxAvg = Math.max(...avgs);
let minAvg = Math.min(...avgs);

document.getElementById("bestRoom").innerText =
labels[avgs.indexOf(maxAvg)];

document.getElementById("worstRoom").innerText =
labels[avgs.indexOf(minAvg)];

let alerts = document.getElementById("alerts");
let foundAlert = false;

for(let i=0; i<avgs.length; i++){

    if(avgs[i] <= 3){

        foundAlert = true;

        alerts.innerHTML +=
        `<li style="color:red;">
            🚨 ${labels[i]} - Rating ${avgs[i]}
        </li>`;
    }
}

if(!foundAlert){
    alerts.innerHTML =
    "<li style='color:green;'>✔ All rooms performing well</li>";
}

let overall =
avgs.reduce((a,b)=>a+b,0) / avgs.length;

if(overall >= 4){
    document.getElementById("overallStatus").innerHTML =
    "✔ Excellent";
}
else if(overall >= 3){
    document.getElementById("overallStatus").innerHTML =
    "⚠ Good";
}
else{
    document.getElementById("overallStatus").innerHTML =
    "🚨 Needs Improvement";
}
</script>

</body>

</html>
