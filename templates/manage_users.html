<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - StarCare</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f6fbfc;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding-top:60px;
        }

        .card{
            width:800px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }

        h2{
            color:#00A79B;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            border-radius:15px;
            overflow:hidden;
        }

        th{
            background:#00A79B;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #eee;
        }

        tr:hover{
            background:#f6fbfb;
        }

        .delete{
            background:#ff4d4d;
            color:white;
            padding:6px 12px;
            border-radius:8px;
            text-decoration:none;
            font-size:13px;
        }

        .add-btn{
            display:inline-block;
            margin-bottom:15px;
            padding:10px 15px;
            background:#00A79B;
            color:white;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        }

        .back{
            display:block;
            margin-top:15px;
            color:#00A79B;
            text-decoration:none;
        }

        .logo{
            width:200px;
            margin:0 auto 20px;
            display:block;
        }

        /* language buttons */
        .lang-switch{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:15px;
        }

        .lang-switch button{
            background:#eafcfd;
            color:#00A79B;
            border:1px solid #00A79B;
            padding:8px 18px;
            border-radius:12px;
            cursor:pointer;
            transition:.3s;
        }

        .lang-switch button:hover{
            background:#00A79B;
            color:white;
        }
    </style>
</head>

<body>

<div class="card">

    <img src="{{ url_for('static', filename='logowhite.jpeg') }}" class="logo">

    <!-- Language -->
    <div class="lang-switch">
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('ar')">عربي</button>
    </div>

    <h2 id="title">Manage Users</h2>

    <a href="/add_user" class="add-btn" id="addBtn">Add User</a>

    <table>
        <tr>
            <th id="thUser">Username</th>
            <th id="thRole">Role</th>
            <th id="thAction">Action</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>
                <a href="/delete_user/{{ user.username }}" class="delete" id="deleteBtn">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

    <a href="/admin" class="back" id="backBtn">Back to Dashboard</a>

</div>

<script>

function setLang(lang){

    localStorage.setItem("lang", lang);

    document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";

    document.getElementById("title").innerText =
        (lang === "ar") ? "إدارة المستخدمين" : "Manage Users";

    document.getElementById("addBtn").innerText =
        (lang === "ar") ? "إضافة مستخدم" : "Add User";

    document.getElementById("thUser").innerText =
        (lang === "ar") ? "اسم المستخدم" : "Username";

    document.getElementById("thRole").innerText =
        (lang === "ar") ? "الدور" : "Role";

    document.getElementById("thAction").innerText =
        (lang === "ar") ? "الإجراء" : "Action";

    document.querySelectorAll(".delete").forEach(btn=>{
        btn.innerText = (lang === "ar") ? "حذف" : "Delete";
    });

    document.getElementById("backBtn").innerText =
        (lang === "ar") ? "رجوع للوحة التحكم" : "Back to Dashboard";
}

window.onload = function(){
    let lang = localStorage.getItem("lang") || "en";
    setLang(lang);
}

</script>

</body>
</html>
