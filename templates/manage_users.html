<h2>Manage Users</h2>

<a href="/add_user">➕ Add User</a>

<table border="1">
    <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Action</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.role }}</td>
        <td>
            <a href="/delete_user/{{ user.username }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
