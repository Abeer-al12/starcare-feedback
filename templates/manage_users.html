<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - StarCare</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f6fbfc;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding-top:60px;
        }

        .card{
            width:800px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }

        h2{
            color:#00A79B;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            border-radius:15px;
            overflow:hidden;
        }

        th{
            background:#00A79B;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #eee;
        }

        tr:hover{
            background:#f6fbfb;
        }

        .delete{
            background:#ff4d4d;
            color:white;
            padding:6px 12px;
            border-radius:8px;
            text-decoration:none;
            font-size:13px;
        }

        .add-btn{
            display:inline-block;
            margin-bottom:15px;
            padding:10px 15px;
            background:#00A79B;
            color:white;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        }

        .add-btn:hover{
            background:#008f88;
        }

        .back{
            display:block;
            margin-top:15px;
            color:#00A79B;
            text-decoration:none;
        }

        .back:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Manage Users</h2>

    <a href="/add_user" class="add-btn">Add User</a>

    <table>
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Action</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>
                <a href="/delete_user/{{ user.username }}" class="delete">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

    <a href="/admin" class="back">Back to Dashboard</a>

</div>

</body>
</html>
