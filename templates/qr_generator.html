<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>QR Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f6fbfc;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #00A79B;
            color: white;
            padding: 20px;
            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 30px;
            width: 100%;
        }

        /* TOPBAR */
        .topbar {
            margin-bottom: 20px;
        }

        .topbar h2 {
            margin: 0;
            color: #00A79B;
        }

        /* CARD */
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 450px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00A79B;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        button:hover {
            background: #008f86;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h3>STARCARE</h3>

        <a href="/admin">Dashboard</a>
        <a href="/analytics">Analytics</a>
        <a href="/qr_dashboard">QR Dashboard</a>
        <a href="/manage_users">Manage Users</a>
        <a href="/logout">Logout</a>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <h2>QR Generator</h2>
            <p>Create QR for patient feedback</p>
        </div>

        <div class="card">

            <h3>Create QR Code</h3>

            <p>Select branch and type room name manually</p>

            <form method="POST" action="/generate_qr">

                <!-- Branch -->
                <label>Branch</label>
                <select name="branch" required>
                    <option value="alhail">Al Hail</option>
                    <option value="mabella">Mabella</option>
                </select>

                <!-- Location -->
                <label>Room / Location</label>
                <input type="text" name="location" placeholder="e.g. Room 101" required>

                <button type="submit">Generate QR</button>

            </form>

            {% if qr_image %}

            <div style="text-align:center; margin-top:20px;">
                <h3>Generated QR</h3>

                <img src="data:image/png;base64,{{ qr_image }}" width="220">

                <p style="color:#777">{{ url }}</p>
            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
