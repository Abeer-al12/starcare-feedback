<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QR Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6fbfc;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #00A79B;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
            color: white;
            box-sizing: border-box;
        }

        .sidebar img {
            width: 100%;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 15px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            margin-bottom: 20px;
        }

        .topbar h3 {
            margin: 0;
            color: #00A79B;
            font-size: 24px;
        }

        .topbar p {
            margin: 5px 0 0;
            color: #777;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            margin-top: 0;
            color: #1b2a41;
        }

        .card p {
            color: #666;
            line-height: 1.6;
        }

        /* ===== BUTTON (جاهز للـ QR لاحقاً) ===== */
        .btn {
            margin-top: 20px;
            padding: 12px 20px;
            background: #00A79B;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn:hover {
            background: #009488;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main {
                margin-left: 0;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <img src="{{ url_for('static', filename='logowhite.jpeg') }}">

        <a href="/admin">Dashboard</a>
        <a href="/analytics">Analytics</a>
        <a href="/qr_dashboard">QR Dashboard</a>
        <a href="/manage_users">Manage Users</a>
        <a href="/logout">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <h3>QR Generator</h3>
            <p>Create New QR Code</p>
        </div>

        <div class="card">

            <form method="POST" action="/generate_qr">

                <input type="text" name="branch" placeholder="Branch" required>
                <input type="text" name="location" placeholder="Location" required>

                <button class="btn" type="submit">Generate QR</button>

            </form>

            {% if qr_image %}

            <div style="margin-top:20px; text-align:center;">

                <p>QR Generated:</p>

                <img src="data:image/png;base64,{{ qr_image }}" width="220">

                <p style="margin-top:10px; color:#777;">
                    {{ url }}
                </p>

            </div>

            {% endif %}

        </div>

</body>

</html>
