{% extends "base.html" %}

{% block content %}

<style>
    .generator-card {
        background: #fff;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        max-width: 850px;
        margin: auto;
    }

    .generator-card h2 {
        margin-top: 0;
        color: #1b2a41;
    }

    .generator-card p {
        color: #777;
        margin-bottom: 30px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: 8px;
        font-weight: 600;
        color: #1b2a41;
    }

    .form-group select {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 15px;
        outline: none;
    }

    .form-group select:focus {
        border-color: #00A79B;
    }

    .generate-btn {
        margin-top: 30px;
        background: #00A79B;
        color: #fff;
        border: none;
        padding: 14px;
        width: 100%;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: .3s;
    }

    .generate-btn:hover {
        background: #008f84;
    }

    .qr-preview {
        margin-top: 35px;
        text-align: center;
        padding: 30px;
        border: 2px dashed #d8d8d8;
        border-radius: 18px;
        background: #fafafa;
    }

    .qr-preview h3 {
        margin-bottom: 10px;
    }

    .qr-box {
        width: 220px;
        height: 220px;
        background: #eee;
        border-radius: 12px;
        margin: 20px auto;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #888;
        font-size: 15px;
    }

    @media(max-width:768px) {

        .form-grid {
            grid-template-columns: 1fr;
        }

    }
</style>

<div class="topbar">
    <h3>QR Generator</h3>
    <p>Create Feedback QR Codes</p>
</div>

<div class="generator-card">

    <h2>Create New QR Code</h2>

    <p>
        Select the branch and room, then generate a QR Code that patients can scan to access the feedback page.
    </p>

    <div class="form-grid">

        <div class="form-group">
            <label>Branch</label>

            <select id="branch">

                <option>Select Branch</option>

                <option>Al Hail</option>

                <option>Mabella</option>

            </select>

        </div>

        <div class="form-group">

            <label>Location</label>

            <select id="location">

                <option>Select Location</option>

            </select>

        </div>

    </div>

    <button class="generate-btn">
        Generate QR Code
    </button>

    <div class="qr-preview">

        <h3>QR Preview</h3>

        <p>The generated QR Code will appear here.</p>

        <div class="qr-box">

            QR Preview

        </div>

    </div>

</div>

{% endblock %}
