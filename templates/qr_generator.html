<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QR Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #eaf9f8, #f6fbfc);
        }

        /* center */
        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* card */
        .card {
            width: 450px;
            background: white;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* header */
        .header {
            background: #00A79B;
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 13px;
            opacity: 0.9;
        }

        /* inputs */
        select,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
        }

        select:focus,
        input:focus {
            border-color: #00A79B;
        }

        /* button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #00A79B;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #008f86;
        }

        /* QR box */
        .qr-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            background: #f8fdfc;
        }

        .qr-box img {
            width: 200px;
            margin-top: 10px;
        }

        /* url */
        .url {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            background: #00A79B;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: bold;
            transition: .3s;
        }

        .back-btn:hover {
            background: #008f86;
        }
    </style>
</head>

<body>

    <div class="main">

        <div class="card">

            <a href="/admin" class="back-btn">
                ← Back to Dashboard
            </a>
            <!-- HEADER -->
            <div class="header">
                <h2>QR Generator</h2>
                <p>Create professional QR codes for feedback</p>
            </div>

            <!-- FORM -->
            <form method="POST" action="/generate_qr">

                <!-- Branch -->
                <select name="branch" required>
                    <option value="">Select Branch</option>
                    <option value="alhail">Al Hail</option>
                    <option value="mabella">Mabella</option>
                </select>

                <!-- Department -->
                <select name="location" required>
                    <option value="">Select Location</option>
                    <option value="lab">Lab</option>
                    <option value="xray">Xray</option>
                    <option value="pharmacy">Pharmacy</option>
                    <option value="consultation">Consultation</option>
                    <option value="reception">Reception</option>
                </select>

                <!-- Room -->
                <input type="text" name="room_number" placeholder="Room Number (e.g 11)" required>

                <button type="submit">Generate QR Code</button>

            </form>
            <!-- RESULT -->
            {% if qr_image %}

            <div class="qr-box">

                <h3 style="color:#00A79B;">Generated QR</h3>

                <img src="data:image/png;base64,{{ qr_image }}">

                <div class="url">{{ url }}</div>

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
